<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flapy Bleu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #00050f; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
  canvas { border: 2px solid #0052FF; border-radius: 8px; box-shadow: 0 0 40px #0052FF66, 0 0 80px #0052FF22; }
  #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #0052FF; font-size: 13px; text-align: center; text-shadow: 0 0 10px #0052FF; white-space: nowrap; }
  #mute { position: fixed; bottom: 14px; right: 14px; background: #0052FF18; border: 1px solid #0052FF44; color: #0052FF; font-family: 'Courier New', monospace; font-size: 12px; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
<div id="ui">💎 FLAPY BLEU — tap or SPACE to flap</div>
<canvas id="c" width="400" height="600"></canvas>
<button id="mute">🔊 SOM</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── AUDIO ───────────────────────────────────
var _ac = null, muted = false;
document.getElementById('mute').onclick = function() {
  muted = !muted;
  document.getElementById('mute').textContent = muted ? '🔇 MUDO' : '🔊 SOM';
};
function getAC() {
  if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (_ac && _ac.state === 'suspended') _ac.resume();
  return _ac;
}
function beep(f1, f2, dur, type, vol) {
  if (muted) return;
  var a = getAC(); if (!a) return;
  try {
    var o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(f1, a.currentTime);
    if (f2 && f2 !== f1) o.frequency.exponentialRampToValueAtTime(f2, a.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.2, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(a.currentTime);
    o.stop(a.currentTime + dur + 0.05);
  } catch(e) {}
}

// ─── FASES (10 fases, muda a cada 10 pontos para teste) ─────
const PHASES = [
  { speed: 2.4, gap: 148, label: 'PHASE 1'  },
  { speed: 2.4, gap: 148, label: 'PHASE 2'  },
  { speed: 2.4, gap: 148, label: 'PHASE 3'  },
  { speed: 2.4, gap: 148, label: 'PHASE 4'  },
  { speed: 2.4, gap: 148, label: 'PHASE 5'  },
  { speed: 2.4, gap: 148, label: 'PHASE 6'  },
  { speed: 2.4, gap: 148, label: 'PHASE 7'  },
  { speed: 2.4, gap: 148, label: 'PHASE 8'  },
  { speed: 2.4, gap: 148, label: 'PHASE 9'  },
  { speed: 2.4, gap: 148, label: 'PHASE 10' },
]; // ← mesma dificuldade em todas, ajustar depois
function getPhaseIdx() { return Math.min(9, Math.floor(score / 4)); }
function getPhase()    { return PHASES[getPhaseIdx()]; }

// ─── PHASE VISUALS ────────────────────────────────
const PHASE_VISUALS = [
  // 0 — PERPDEX TERMINAL
  { name:'PERPDEX TERMINAL', bg:['#020812','#040d18'], groundColor:'#030a12', groundLine:'#00ff41',
    glowColor:'#00ff41', candleUp:'#00e676', candleDown:'#ff1744', trend:0, type:'terminal' },
  // 1 — COINBASE / BASE
  { name:'BASE NETWORK', bg:['#0a3a7a','#1a5ab8'], groundColor:'#0d3060', groundLine:'#00c8ff',
    glowColor:'#00c8ff', candleUp:'#00ffff', candleDown:'#ff00dd', trend:-10, type:'coinbase' },
  // 2 — CRYPTO FOREST
  { name:'CRYPTO FOREST', bg:['#040e06','#091c0a'], groundColor:'#071408', groundLine:'#4CAF50',
    glowColor:'#66BB6A', candleUp:'#8D6E63', candleDown:'#5D4037', trend:0, type:'forest' },
  // 3 — TO THE MOON (sky)
  { name:'TO THE MOON', bg:['#1a3a6b','#4e88c8'], groundColor:'#5c7090', groundLine:'#ffffff',
    glowColor:'#FFE066', candleUp:'#e0e8ff', candleDown:'#7a99cc', trend:-20, type:'sky' },
  // 4 — HEAVEN'S GATE
  { name:"HEAVEN'S GATE", bg:['#0d0824','#2a1255'], groundColor:'#2e2000', groundLine:'#FFD700',
    glowColor:'#FFD700', candleUp:'#FFD700', candleDown:'#FF8C00', trend:0, type:'heaven' },
  // 5 — MEDIEVAL CASTLE (Donkey Kong spikes)
  { name:'MEDIEVAL CASTLE', bg:['#0a0615','#180a28'], groundColor:'#12081a', groundLine:'#9966cc',
    glowColor:'#bb88ff', candleUp:'#9966cc', candleDown:'#cc3366', trend:5, type:'castle' },
  // 6-9 — DEEP SPACE (user to describe later)
  { name:'DEEP SPACE',  bg:['#000005','#050015'], groundColor:'#040010', groundLine:'#9900FF',
    glowColor:'#9900FF', candleUp:'#aa44ff', candleDown:'#ff00aa', trend:0, type:'space' },
  { name:'DARK MATTER', bg:['#000000','#080008'], groundColor:'#030003', groundLine:'#cc00ff',
    glowColor:'#cc00ff', candleUp:'#dd44ff', candleDown:'#ff0088', trend:10, type:'space' },
  { name:'WORMHOLE',    bg:['#000005','#000818'], groundColor:'#000308', groundLine:'#00ffff',
    glowColor:'#00ffff', candleUp:'#00ffcc', candleDown:'#ff0055', trend:-10, type:'space' },
  { name:'SUPERNOVA',   bg:['#180000','#280010'], groundColor:'#0f0005', groundLine:'#ff6600',
    glowColor:'#ff6600', candleUp:'#ffaa00', candleDown:'#ff2200', trend:0, type:'space' },
  { name:'GOD MODE',    bg:['#050000','#0a0000'], groundColor:'#050000', groundLine:'#ff0000',
    glowColor:'#ff0000', candleUp:'#ff4444', candleDown:'#aa0000', trend:0, type:'space' },
];
function getPhaseVisual() { return PHASE_VISUALS[getPhaseIdx()]; }

// ─── HIGHSCORE ───────────────────────────────
let highScore = parseInt(localStorage.getItem('bleuHS') || '0');
let newRecord = false;

// ─── NFT CHARACTER SYSTEM ────────────────────
var unlockedChars = parseInt(localStorage.getItem('bleuChars') || '1'); // 1=Bleu only, 2=Brett unlocked
var activeChar    = parseInt(localStorage.getItem('bleuActiveChar') || '0'); // 0=Bleu, 1=Brett
var nftFlash      = 0; // NFT unlock animation counter
var showCharSel   = false; // show character selector in idle

// ─── STATE ───────────────────────────────────
let bleu, pipes, score, frame, gameState, particles, lastGapCenter;
let phaseFlash = 0, lastPhaseIdx = 0;

function resetGame() {
  bleu          = { x:90, y:H/2, vy:0, flap:0 };
  pipes         = [];
  score         = 0;
  frame         = 0;
  gameState     = 'idle';
  particles     = [];
  newRecord     = false;
  lastGapCenter = H / 2;
  phaseFlash    = 0;
  lastPhaseIdx  = 0;
  nftFlash      = 0;
}
resetGame();

// ─────────────────────────────────────────────
//  BLEU — personagem principal
// ─────────────────────────────────────────────
function drawBleu(x, y, flapAnim, vy) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.max(-0.45, Math.min(0.65, vy * 0.04)));

  const R  = 20;
  const wf = Math.sin(flapAnim * 2.2) * 11;

  // ASAS DOURADAS — esquerda
  ctx.save();
  const lgw = ctx.createLinearGradient(-R-28, wf, -R, 5);
  lgw.addColorStop(0, '#FFE500cc'); lgw.addColorStop(1, '#FF8C0066');
  ctx.fillStyle = lgw;
  ctx.beginPath();
  ctx.moveTo(-R+2, 0);
  ctx.bezierCurveTo(-R-4, -10+wf, -R-18, -16+wf, -R-28, -4+wf);
  ctx.bezierCurveTo(-R-20, 10+wf, -R-6, 12, -R+2, 8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#FFD700aa'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = '#FFE500cc'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-R+2,4); ctx.bezierCurveTo(-R-6,-2+wf,-R-14,-4+wf,-R-22,0+wf); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-R+2,6); ctx.bezierCurveTo(-R-5, 4+wf,-R-12, 6+wf,-R-18,8+wf); ctx.stroke();
  ctx.restore();

  // ASAS DOURADAS — direita
  ctx.save();
  const rgw = ctx.createLinearGradient(R+28, wf, R, 5);
  rgw.addColorStop(0, '#FFE500cc'); rgw.addColorStop(1, '#FF8C0066');
  ctx.fillStyle = rgw;
  ctx.beginPath();
  ctx.moveTo(R-2, 0);
  ctx.bezierCurveTo(R+4, -10+wf, R+18, -16+wf, R+28, -4+wf);
  ctx.bezierCurveTo(R+20, 10+wf, R+6, 12, R-2, 8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#FFD700aa'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = '#FFE500cc'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(R-2,4); ctx.bezierCurveTo(R+6,-2+wf,R+14,-4+wf,R+22,0+wf); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(R-2,6); ctx.bezierCurveTo(R+5, 4+wf,R+12, 6+wf,R+18,8+wf); ctx.stroke();
  ctx.restore();

  // ANEL COIN DOURADO
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 18;
  ctx.strokeStyle = '#FFA500'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, R+8, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, R+5, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#FFE56699'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, R+3, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;

  // CABEÇA
  const hg = ctx.createRadialGradient(-6, -7, 1, 0, 0, R);
  hg.addColorStop(0,   '#72A8FF');
  hg.addColorStop(0.4, '#0052FF');
  hg.addColorStop(1,   '#001EA8');
  ctx.fillStyle = hg;
  ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#001266'; ctx.lineWidth = 1.5; ctx.stroke();

  // ORELHAS DE GATO
  ctx.fillStyle = '#0052FF';
  ctx.beginPath(); ctx.moveTo(-R+6,-R+5); ctx.lineTo(-R-8,-R-18); ctx.lineTo(-R+14,-R-1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#001266'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#FF9BB5';
  ctx.beginPath(); ctx.moveTo(-R+5,-R+3); ctx.lineTo(-R-4,-R-11); ctx.lineTo(-R+9,-R+1); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#0052FF';
  ctx.beginPath(); ctx.moveTo(R-6,-R+5); ctx.lineTo(R+8,-R-18); ctx.lineTo(R-14,-R-1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#001266'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#FF9BB5';
  ctx.beginPath(); ctx.moveTo(R-5,-R+3); ctx.lineTo(R+4,-R-11); ctx.lineTo(R-9,-R+1); ctx.closePath(); ctx.fill();

  // OLHO ESQUERDO
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#0052FF33'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.ellipse(-10, -4, 9, 10, 0.1, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  const li = ctx.createRadialGradient(-11,-5,0,-10,-3,6.5);
  li.addColorStop(0, '#FFE800'); li.addColorStop(0.6,'#FFB800'); li.addColorStop(1,'#FF7700');
  ctx.fillStyle = li;
  ctx.beginPath(); ctx.ellipse(-10, -3, 6.5, 7.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0020';
  ctx.beginPath(); ctx.ellipse(-10, -3, 4, 5.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-7.5,-7, 2.4,2.4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-12,-1.5,1.2,1.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFFFFFaa';
  ctx.beginPath(); ctx.ellipse(-10,-3,1,1,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0020';
  ctx.beginPath(); ctx.ellipse(-10,-12.8,8.5,2.2,0,0,Math.PI*2); ctx.fill();

  // OLHO DIREITO
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(10, -4, 9, 10, -0.1, 0, Math.PI*2); ctx.fill();
  const ri = ctx.createRadialGradient(11,-5,0,10,-3,6.5);
  ri.addColorStop(0, '#FFE800'); ri.addColorStop(0.6,'#FFB800'); ri.addColorStop(1,'#FF7700');
  ctx.fillStyle = ri;
  ctx.beginPath(); ctx.ellipse(10, -3, 6.5, 7.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0020';
  ctx.beginPath(); ctx.ellipse(10, -3, 4, 5.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(12.5,-7, 2.4,2.4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-1.5,1.2,1.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFFFFFaa';
  ctx.beginPath(); ctx.ellipse(10,-3,1,1,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0020';
  ctx.beginPath(); ctx.ellipse(10,-12.8,8.5,2.2,0,0,Math.PI*2); ctx.fill();

  // NARIZ
  ctx.fillStyle = '#001266';
  ctx.beginPath(); ctx.ellipse(0, 5, 3.5, 2.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5C9AFF55';
  ctx.beginPath(); ctx.ellipse(-1, 4.2, 1.5, 1, 0, 0, Math.PI*2); ctx.fill();

  // SORRISO
  ctx.strokeStyle = '#001266'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-11, 11);
  ctx.quadraticCurveTo(0, 23, 11, 11);
  ctx.stroke();
  const tg = ctx.createLinearGradient(0,11,0,18);
  tg.addColorStop(0,'#ffffff'); tg.addColorStop(1,'#dde4ff');
  ctx.fillStyle = tg;
  ctx.fillRect(-9, 11, 5, 7);
  ctx.fillRect(-3, 11, 5, 7);
  ctx.fillRect(4,  11, 4, 6);
  ctx.strokeStyle = '#ccd'; ctx.lineWidth = 0.5;
  ctx.strokeRect(-9,11,5,7); ctx.strokeRect(-3,11,5,7); ctx.strokeRect(4,11,4,6);

  // BOCHECHAS
  ctx.globalAlpha = 0.22;
  const bL = ctx.createRadialGradient(-17,5,0,-17,5,9);
  bL.addColorStop(0,'#FF6BA8'); bL.addColorStop(1,'transparent');
  ctx.fillStyle = bL;
  ctx.beginPath(); ctx.ellipse(-17,5,9,6,0,0,Math.PI*2); ctx.fill();
  const bR = ctx.createRadialGradient(17,5,0,17,5,9);
  bR.addColorStop(0,'#FF6BA8'); bR.addColorStop(1,'transparent');
  ctx.fillStyle = bR;
  ctx.beginPath(); ctx.ellipse(17,5,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // COROA
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 14;
  const crg = ctx.createLinearGradient(0,-R-18,0,-R);
  crg.addColorStop(0,'#FFEE44'); crg.addColorStop(1,'#FF9900');
  ctx.fillStyle = crg;
  ctx.beginPath();
  ctx.moveTo(-16,-R-1);
  ctx.lineTo(-16,-R-13);
  ctx.lineTo(-9, -R-7);
  ctx.lineTo(0,  -R-20);
  ctx.lineTo(9,  -R-7);
  ctx.lineTo(16, -R-13);
  ctx.lineTo(16, -R-1);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#FFAA00';
  ctx.fillRect(-16,-R-4, 32, 5);
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#FF2255'; ctx.shadowColor = '#FF2255';
  ctx.beginPath(); ctx.arc(-9,-R-9, 3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#00EEFF'; ctx.shadowColor = '#00EEFF';
  ctx.beginPath(); ctx.arc(0, -R-16,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#00FF99'; ctx.shadowColor = '#00FF99';
  ctx.beginPath(); ctx.arc(9, -R-9, 3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffffaa'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(-9.8,-R-10,1.2,1.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-0.8,-R-17,1.4,1.4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8.2, -R-10,1.2,1.2,0,0,Math.PI*2); ctx.fill();

  // CORRENTE
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for(var ci = -3; ci <= 3; ci++) {
    ctx.beginPath();
    ctx.arc(ci * 4.2, R+2 + Math.abs(ci)*0.4, 2.5, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // PENDENTE DIAMANTE
  ctx.shadowColor = '#00D4FF'; ctx.shadowBlur = 16;
  ctx.fillStyle = '#00D4FF';
  ctx.beginPath();
  ctx.moveTo(0, R+9); ctx.lineTo(6, R+15); ctx.lineTo(0, R+21); ctx.lineTo(-6, R+15);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#88F4FF';
  ctx.beginPath();
  ctx.moveTo(0, R+9); ctx.lineTo(3, R+13); ctx.lineTo(0, R+16); ctx.lineTo(-3, R+13);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffffffcc';
  ctx.beginPath();
  ctx.moveTo(0, R+9); ctx.lineTo(1.5,R+11); ctx.lineTo(0, R+13); ctx.lineTo(-1.5,R+11);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ─── BRETT — personagem desbloqueável (NFT) ──
function drawBrett(x, y, flapAnim, vy) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.max(-0.45, Math.min(0.65, vy * 0.04)));

  const R  = 20;
  const wf = Math.sin(flapAnim * 2.2) * 11;

  // ASAS VERMELHAS / LARANJAS
  ctx.save();
  const lgw = ctx.createLinearGradient(-R-28, wf, -R, 5);
  lgw.addColorStop(0, '#FF6600cc'); lgw.addColorStop(1, '#FF220066');
  ctx.fillStyle = lgw;
  ctx.beginPath();
  ctx.moveTo(-R+2, 0);
  ctx.bezierCurveTo(-R-4, -10+wf, -R-18, -16+wf, -R-28, -4+wf);
  ctx.bezierCurveTo(-R-20, 10+wf, -R-6, 12, -R+2, 8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#FF8800aa'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = '#FF6600cc'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-R+2,4); ctx.bezierCurveTo(-R-6,-2+wf,-R-14,-4+wf,-R-22,0+wf); ctx.stroke();
  ctx.restore();
  ctx.save();
  const rgw = ctx.createLinearGradient(R+28, wf, R, 5);
  rgw.addColorStop(0, '#FF6600cc'); rgw.addColorStop(1, '#FF220066');
  ctx.fillStyle = rgw;
  ctx.beginPath();
  ctx.moveTo(R-2, 0);
  ctx.bezierCurveTo(R+4, -10+wf, R+18, -16+wf, R+28, -4+wf);
  ctx.bezierCurveTo(R+20, 10+wf, R+6, 12, R-2, 8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#FF8800aa'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  // ANEL PRATA
  ctx.shadowColor = '#C0C0C0'; ctx.shadowBlur = 18;
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, R+8, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, R+5, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;

  // CABEÇA laranja
  const hg = ctx.createRadialGradient(-6, -7, 1, 0, 0, R);
  hg.addColorStop(0, '#FF9A5C'); hg.addColorStop(0.45, '#FF6B20'); hg.addColorStop(1, '#CC3300');
  ctx.fillStyle = hg;
  ctx.shadowColor = '#FF6B20'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#881100'; ctx.lineWidth = 1.5; ctx.stroke();

  // ORELHAS TEAL
  ctx.fillStyle = '#00897B';
  ctx.beginPath(); ctx.moveTo(-R+6,-R+5); ctx.lineTo(-R-8,-R-18); ctx.lineTo(-R+14,-R-1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#004D40'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#80CBC4';
  ctx.beginPath(); ctx.moveTo(-R+5,-R+3); ctx.lineTo(-R-4,-R-11); ctx.lineTo(-R+9,-R+1); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#00897B';
  ctx.beginPath(); ctx.moveTo(R-6,-R+5); ctx.lineTo(R+8,-R-18); ctx.lineTo(R-14,-R-1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#004D40'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#80CBC4';
  ctx.beginPath(); ctx.moveTo(R-5,-R+3); ctx.lineTo(R+4,-R-11); ctx.lineTo(R-9,-R+1); ctx.closePath(); ctx.fill();

  // OLHOS — âmbar/dourado
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-10,-4,9,10,0.1,0,Math.PI*2); ctx.fill();
  const li = ctx.createRadialGradient(-11,-5,0,-10,-3,6.5);
  li.addColorStop(0,'#FFB300'); li.addColorStop(0.6,'#FF8F00'); li.addColorStop(1,'#E65100');
  ctx.fillStyle = li;
  ctx.beginPath(); ctx.ellipse(-10,-3,6.5,7.5,0,0,Math.PI*2); ctx.fill();

  ctx.shadowColor = '#C0C0C0'; ctx.shadowBlur = 8;

    ctx.beginPath(); ctx.arc(ci*4.2, R+2+Math.abs(ci)*0.4, 2.5, 0, Math.PI*2); ctx.stroke();

  // PENDENTE RUBI VERMELHO
  ctx.shadowColor = '#FF1122'; ctx.shadowBlur = 16;

// ─── PIPE / OBSTACLE ─────────────────────────
function makePipe(x) {
  const pv  = getPhaseVisual();
  const gap = getPhase().gap;
  const jitter = (Math.random() - 0.5) * 70;
  let center   = lastGapCenter + pv.trend + jitter;
  const minC   = 110 + gap/2;
  const maxC   = H - 80 - gap/2 - 20;
  center       = Math.max(minC, Math.min(maxC, center));
  lastGapCenter = center;
  const topH   = center - gap/2;
  const botY   = center + gap/2;
  return {
    x, topH, gap, bodyW:42, wickW:5,
    topBodyH: topH * (0.45 + Math.random()*0.4),
    botBodyH: (H-80-botY) * (0.45 + Math.random()*0.4),
    isGreen: Math.random() > 0.5, botY, passed:false
  };
}

// ─── DRAW CANDLE (phases 0-1 and space) ──────
function drawCandle(p, upColor, downColor) {
  const color = p.isGreen ? upColor : downColor;
  const cx    = p.x + p.bodyW/2;
  ctx.shadowColor = color + '99'; ctx.shadowBlur = 14;
  // wick top
  ctx.fillStyle = '#888';
  ctx.fillRect(cx - p.wickW/2, 0, p.wickW, p.topH - p.topBodyH);
  // body top
  ctx.fillStyle = color;
  ctx.fillRect(p.x, p.topH - p.topBodyH, p.bodyW, p.topBodyH);
  ctx.strokeStyle = '#ffffff22'; ctx.lineWidth = 1;
  ctx.strokeRect(p.x, p.topH - p.topBodyH, p.bodyW, p.topBodyH);
  // flame top
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(cx, 3, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff8';
  ctx.beginPath(); ctx.arc(cx, 2, 1.5, 0, Math.PI*2); ctx.fill();
  // body bottom
  ctx.fillStyle = color;
  ctx.fillRect(p.x, p.botY, p.bodyW, p.botBodyH);
  ctx.strokeRect(p.x, p.botY, p.bodyW, p.botBodyH);
  // wick bottom
  ctx.fillStyle = '#888';
  ctx.fillRect(cx - p.wickW/2, p.botY+p.botBodyH, p.wickW, H-80-p.botY-p.botBodyH);
  // flame bottom
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(cx, H-82, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff8';
  ctx.beginPath(); ctx.arc(cx, H-83, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ─── DRAW TREE OBSTACLE — Super Mario style ──
// Full-width trunk = exact collision box. Canopy stays inside obstacle bounds.
function drawTreeObstacle(p) {
  var trunkC = '#6D4C41', bark = '#4E342E';
  var cx = p.x + p.bodyW/2;

  // Mario canopy = three overlapping circles. Keep inside bounds.
  function marioCanopy(baseCY, flip) {
    // baseCY = y where trunk meets canopy (= topH for top, botY for bottom)
    // flip: 1 = canopy goes UP (top tree), -1 = canopy goes DOWN (bottom tree)
    var r1 = 20, r2 = 16, r3 = 13;
    var cy1 = baseCY + flip * r1 * 0.3;       // center main ball
    // Draw back side balls first
    ctx.fillStyle = '#388E3C';
    ctx.beginPath(); ctx.arc(cx - 16, cy1 + flip*4, r2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#66BB6A'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + 15, cy1 + flip*3, r2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#66BB6A'; ctx.lineWidth = 1.5; ctx.stroke();
    // Main central ball
    ctx.shadowColor = '#4CAF50'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath(); ctx.arc(cx, cy1, r1, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#81C784'; ctx.lineWidth = 2; ctx.stroke();
    ctx.shadowBlur = 0;
    // Small highlight ball on top of main
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath(); ctx.arc(cx - 5, cy1 + flip*10, r3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#A5D6A7'; ctx.lineWidth = 1; ctx.stroke();
    // Shine
    ctx.fillStyle = '#ffffff33';
    ctx.beginPath(); ctx.arc(cx - 7, cy1 + flip*6, 6, 0, Math.PI*2); ctx.fill();
  }

  // ── TOP obstacle: trunk 0→topH, canopy at bottom of trunk ──
  // Short visible trunk section (bottom part) + dark wall above it
  var trunkH = Math.min(28, p.topH * 0.35);
  // Dark cave wall above trunk
  ctx.fillStyle = '#1a0f05';
  ctx.fillRect(p.x, 0, p.bodyW, p.topH - trunkH);
  // Outline
  ctx.strokeStyle = '#0a0702'; ctx.lineWidth = 1;
  ctx.strokeRect(p.x, 0, p.bodyW, p.topH - trunkH);
  // Trunk
  var tGrad = ctx.createLinearGradient(p.x, 0, p.x+p.bodyW, 0);
  tGrad.addColorStop(0, bark); tGrad.addColorStop(0.45, trunkC); tGrad.addColorStop(1, bark);
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x, p.topH - trunkH, p.bodyW, trunkH);
  ctx.strokeStyle = bark; ctx.lineWidth = 1;
  ctx.strokeRect(p.x, p.topH - trunkH, p.bodyW, trunkH);
  // Bark grain
  ctx.strokeStyle = bark; ctx.lineWidth = 1;
  for(var by=p.topH-trunkH+4; by<p.topH-3; by+=8){
    ctx.beginPath(); ctx.moveTo(p.x+4,by); ctx.lineTo(p.x+14,by+3); ctx.stroke();
  }
  // Canopy anchored at topH (goes UP into trunk space)
  marioCanopy(p.topH, -1);

  // ── BOTTOM obstacle: trunk botY→ground, canopy at top of trunk ──
  var trunkH2 = Math.min(28, (H-80-p.botY) * 0.35);
  // Canopy at botY (goes DOWN)
  marioCanopy(p.botY, 1);
  // Trunk
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x, p.botY + trunkH2 - 4, p.bodyW, (H-80-p.botY) - trunkH2 + 4);
  ctx.strokeStyle = bark; ctx.lineWidth = 1;
  ctx.strokeRect(p.x, p.botY + trunkH2 - 4, p.bodyW, (H-80-p.botY) - trunkH2 + 4);
  for(var by2=p.botY+trunkH2+2; by2<H-84; by2+=8){
    ctx.beginPath(); ctx.moveTo(p.x+4,by2); ctx.lineTo(p.x+14,by2+3); ctx.stroke();
  }
  // Dark wall below trunk
  ctx.fillStyle = '#1a0f05';
  ctx.fillRect(p.x, p.botY + (H-80-p.botY)*0.65, p.bodyW, (H-80-p.botY)*0.35);
  ctx.strokeStyle = '#0a0702'; ctx.lineWidth = 1;
  ctx.strokeRect(p.x, p.botY + (H-80-p.botY)*0.65, p.bodyW, (H-80-p.botY)*0.35);
}

// ─── DRAW MOUNTAIN OBSTACLE — wide, proper mountain shape ──
function drawMountainObstacle(p) {
  var cDark = '#2a3f5e', cMid = '#3d5a7e', cLight = '#5075a0', cSnow = '#ffffffee', cIce = '#c8dff0cc';
  var cx = p.x + p.bodyW/2;
  // Visual mountain is much wider than collision box for realistic look
  var mw = 150; // wide visual
  var ml = cx - mw/2, mr = cx + mw/2;

  // ── TOP: rocky ceiling + wide stalactite pointing down ──
  // Solid collision fill (narrow core)
  ctx.fillStyle = cDark;
  ctx.fillRect(p.x, 0, p.bodyW, p.topH);
  // Wide mountain shape (back layer, lighter)
  ctx.fillStyle = cLight + 'cc';
  ctx.beginPath();
  ctx.moveTo(Math.max(0, ml - 40), 0);
  ctx.lineTo(Math.min(W, mr + 40), 0);
  ctx.lineTo(mr + 20, p.topH * 0.55);
  ctx.lineTo(cx + 22, p.topH);
  ctx.lineTo(cx, p.topH + 6); // tip just into gap (visual only)
  ctx.lineTo(cx - 22, p.topH);
  ctx.lineTo(ml - 20, p.topH * 0.55);
  ctx.closePath(); ctx.fill();
  // Front mountain face (darker)
  ctx.fillStyle = cMid;
  ctx.beginPath();
  ctx.moveTo(Math.max(0, ml), 0);
  ctx.lineTo(Math.min(W, mr), 0);
  ctx.lineTo(cx + 18, p.topH);
  ctx.lineTo(cx, p.topH + 6);
  ctx.lineTo(cx - 18, p.topH);
  ctx.closePath(); ctx.fill();
  // Sunlit face (right side highlight)
  ctx.fillStyle = cLight + 'aa';
  ctx.beginPath();
  ctx.moveTo(cx, 0); ctx.lineTo(mr, 0);
  ctx.lineTo(cx + 18, p.topH); ctx.lineTo(cx, p.topH + 6);
  ctx.closePath(); ctx.fill();
  // Snow/ice cap on tip
  ctx.fillStyle = cSnow;
  ctx.beginPath();
  ctx.moveTo(cx - 24, p.topH * 0.22); ctx.lineTo(cx, p.topH + 6); ctx.lineTo(cx + 24, p.topH * 0.22);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = cIce;
  ctx.beginPath();
  ctx.moveTo(cx - 12, p.topH * 0.55); ctx.lineTo(cx, p.topH + 6); ctx.lineTo(cx + 12, p.topH * 0.55);
  ctx.closePath(); ctx.fill();
  // Ridge line
  ctx.strokeStyle = '#ffffff55'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 45, p.topH * 0.15); ctx.lineTo(cx, p.topH + 6); ctx.stroke();

  // ── BOTTOM: wide mountain pointing up ──
  ctx.fillStyle = cDark;
  ctx.fillRect(p.x, p.botY, p.bodyW, H-80-p.botY);
  // Wide back layer
  ctx.fillStyle = cLight + 'cc';
  ctx.beginPath();
  ctx.moveTo(cx - 22, p.botY); ctx.lineTo(cx, p.botY - 6);
  ctx.lineTo(cx + 22, p.botY);
  ctx.lineTo(mr + 20, H-80 - (H-80-p.botY)*0.55);
  ctx.lineTo(Math.min(W, mr + 40), H-80);
  ctx.lineTo(Math.max(0, ml - 40), H-80);
  ctx.lineTo(ml - 20, H-80 - (H-80-p.botY)*0.55);
  ctx.closePath(); ctx.fill();
  // Front face
  ctx.fillStyle = cMid;
  ctx.beginPath();
  ctx.moveTo(cx - 18, p.botY); ctx.lineTo(cx, p.botY - 6); ctx.lineTo(cx + 18, p.botY);
  ctx.lineTo(mr, H-80); ctx.lineTo(ml, H-80);
  ctx.closePath(); ctx.fill();
  // Sunlit face
  ctx.fillStyle = cLight + 'aa';
  ctx.beginPath();
  ctx.moveTo(cx, p.botY - 6); ctx.lineTo(cx + 18, p.botY); ctx.lineTo(mr, H-80); ctx.lineTo(cx, H-80);
  ctx.closePath(); ctx.fill();
  // Snow cap
  ctx.fillStyle = cSnow;
  ctx.beginPath();
  ctx.moveTo(cx - 24, p.botY + (H-80-p.botY)*0.22); ctx.lineTo(cx, p.botY - 6); ctx.lineTo(cx + 24, p.botY + (H-80-p.botY)*0.22);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = cIce;
  ctx.beginPath();
  ctx.moveTo(cx - 12, p.botY + (H-80-p.botY)*0.55); ctx.lineTo(cx, p.botY - 6); ctx.lineTo(cx + 12, p.botY + (H-80-p.botY)*0.55);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#ffffff55'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 45, p.botY + (H-80-p.botY)*0.18); ctx.lineTo(cx, p.botY - 6); ctx.stroke();
}

// ─── TITAN FACE BACKGROUND (Attack on Titan) ─
function drawTitanFaceBg() {
  var fcx = W/2, fcy = H + 30, fR = 300;
  // Shadow halo
  ctx.fillStyle = '#00000066';
  ctx.beginPath(); ctx.arc(fcx, fcy, fR+30, 0, Math.PI*2); ctx.fill();
  // Flesh/muscle head (AoT titans have exposed muscle, no skin)
  var hg = ctx.createRadialGradient(fcx-60, fcy-120, 20, fcx, fcy, fR);
  hg.addColorStop(0, '#c85040bb'); hg.addColorStop(0.45, '#8a3030aa'); hg.addColorStop(1, '#2a100888');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(fcx, fcy, fR, 0, Math.PI*2); ctx.fill();
  // Steam / heat distortion lines
  ctx.save();
  for(var si=0; si<8; si++) {
    var sx = fcx - 150 + si*42;
    var sy = fcy - fR + 15 + (si%3)*10;
    ctx.strokeStyle = '#ff441808'; ctx.lineWidth = 3 + (si%2);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(sx + 12*Math.cos(frame*0.02+si), sy - 40, sx + 5, sy - 100);
    ctx.stroke();
  }
  ctx.restore();
  // Brow ridge
  ctx.fillStyle = '#4a201088';
  ctx.beginPath();
  ctx.ellipse(fcx, fcy - 185, 130, 28, 0, 0, Math.PI*2); ctx.fill();
  // LEFT EYE — hollow, glowing red (AoT style)
  var lex = fcx - 72, ley = fcy - 170;
  ctx.fillStyle = '#110500cc';
  ctx.beginPath(); ctx.ellipse(lex, ley, 44, 30, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#eeeeddaa';
  ctx.beginPath(); ctx.ellipse(lex, ley, 32, 22, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff2200cc';
  ctx.beginPath(); ctx.ellipse(lex, ley, 20, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000000ff';
  ctx.beginPath(); ctx.ellipse(lex, ley, 11, 11, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 22;
  ctx.fillStyle = '#ff330044';
  ctx.beginPath(); ctx.ellipse(lex, ley, 46, 32, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // RIGHT EYE
  var rex = fcx + 72, rey = fcy - 170;
  ctx.fillStyle = '#110500cc';
  ctx.beginPath(); ctx.ellipse(rex, rey, 44, 30, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#eeeeddaa';
  ctx.beginPath(); ctx.ellipse(rex, rey, 32, 22, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff2200cc';
  ctx.beginPath(); ctx.ellipse(rex, rey, 20, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000000ff';
  ctx.beginPath(); ctx.ellipse(rex, rey, 11, 11, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 22;
  ctx.fillStyle = '#ff330044';
  ctx.beginPath(); ctx.ellipse(rex, rey, 46, 32, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Nose bridge area
  ctx.fillStyle = '#60281888';
  ctx.beginPath(); ctx.ellipse(fcx, fcy - 130, 25, 40, 0, 0, Math.PI*2); ctx.fill();
}

// ─── DRAW TITAN HAND (phase 4) — hands from SIDES ─
// TOP obstacle: LEFT hand reaches from left wall toward gap (fingers point RIGHT)
// BOT obstacle: RIGHT hand reaches from right wall toward gap (fingers point LEFT)
function drawTitanHand(p) {
  // Skin colors — flesh-toned giant titan
  var sk1 = '#c8a060', sk2 = '#9a7040', sk3 = '#e0b870', sk4 = '#503010', sk5 = '#7a5030';
  var cx = p.x + p.bodyW/2;
  var midY_top = p.topH / 2;        // vertical center of top obstacle
  var midY_bot = p.botY + (H-80-p.botY)/2; // vertical center of bottom obstacle

  // ── HELPER: draw one giant finger (horizontal) ──
  function finger(x, y, len, h, dir, shortened) {
    // dir: 1 = pointing RIGHT, -1 = pointing LEFT
    var fl = shortened ? len*0.78 : len;
    var fx = dir > 0 ? x : x - fl;
    var grad = ctx.createLinearGradient(fx, y, fx+fl, y+h);
    grad.addColorStop(0, sk3); grad.addColorStop(0.5, sk1); grad.addColorStop(1, sk2);
    ctx.fillStyle = grad;
    ctx.fillRect(fx, y, fl, h);
    ctx.strokeStyle = sk4; ctx.lineWidth = 1.2;
    ctx.strokeRect(fx, y, fl, h);
    // knuckle joints
    ctx.fillStyle = sk4 + 'aa';
    ctx.fillRect(fx + fl*0.33, y+1, 2, h-2);
    ctx.fillRect(fx + fl*0.66, y+1, 2, h-2);
    // fingertip rounded edge
    ctx.fillStyle = sk2;
    ctx.beginPath();
    ctx.arc(dir > 0 ? fx+fl : fx, y+h/2, h/2-1, dir>0?-Math.PI/2:-Math.PI/2, dir>0?Math.PI/2:-Math.PI/2, dir<0);
    ctx.fill();
  }

  // ══ TOP OBSTACLE: LEFT HAND reaching RIGHT ══
  // Solid collision fill
  ctx.fillStyle = sk2;
  ctx.fillRect(p.x, 0, p.bodyW, p.topH);

  // Arm — spans from left wall to pipe start (visual extension, no collision)
  if(p.x > 0) {
    var armH = p.topH * 0.55;
    var armY = midY_top - armH/2;
    var aGrad = ctx.createLinearGradient(0, armY, p.x, armY+armH);
    aGrad.addColorStop(0, sk5); aGrad.addColorStop(0.6, sk2); aGrad.addColorStop(1, sk1);
    ctx.fillStyle = aGrad;
    ctx.fillRect(0, armY, p.x, armH);
    ctx.strokeStyle = sk4; ctx.lineWidth = 1;
    // tendon lines along arm
    for(var ai=0; ai<3; ai++){
      ctx.beginPath();
      ctx.moveTo(0, armY + armH*(0.25 + ai*0.25));
      ctx.quadraticCurveTo(p.x*0.5, armY + armH*(0.22 + ai*0.25) + (ai-1)*4, p.x, midY_top + (ai-1)*10);
      ctx.stroke();
    }
  }
  // Palm — at pipe position
  var palG = ctx.createLinearGradient(p.x, 0, p.x+p.bodyW, p.topH);
  palG.addColorStop(0, sk2); palG.addColorStop(0.4, sk1); palG.addColorStop(1, sk3);
  ctx.fillStyle = palG;
  ctx.fillRect(p.x, 0, p.bodyW, p.topH);
  // Palm creases
  ctx.strokeStyle = sk4; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x+4, midY_top-8); ctx.quadraticCurveTo(p.x+p.bodyW/2, midY_top-5, p.x+p.bodyW-4, midY_top-2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x+4, midY_top+6); ctx.quadraticCurveTo(p.x+p.bodyW/2, midY_top+9, p.x+p.bodyW-4, midY_top+12);
  ctx.stroke();
  // Thumb (stubby, on bottom of palm for left hand)
  ctx.fillStyle = sk1;
  ctx.fillRect(p.x+2, p.topH-14, p.bodyW*0.55, 12);
  ctx.strokeStyle = sk4; ctx.lineWidth = 1; ctx.strokeRect(p.x+2, p.topH-14, p.bodyW*0.55, 12);
  // 4 Fingers pointing RIGHT out of palm (extending into gap space, visual only)
  var fH = 11, fLen = 38, fGap = 13;
  var fStartY = p.topH - fH*4 - fGap*3 - 8;
  var fStartX = p.x + p.bodyW;
  for(var f=0; f<4; f++){
    finger(fStartX, fStartY + f*(fH+fGap), fLen, fH, 1, f===0||f===3);
  }
  // Drop shadow into gap
  ctx.fillStyle = '#00000033';
  ctx.fillRect(p.x, p.topH, p.bodyW+fLen, 6);

  // ══ BOTTOM OBSTACLE: RIGHT HAND reaching LEFT ══
  ctx.fillStyle = sk2;
  ctx.fillRect(p.x, p.botY, p.bodyW, H-80-p.botY);

  // Arm — spans from pipe end to right wall
  var armRight = p.x + p.bodyW;
  if(armRight < W) {
    var bArmH = (H-80-p.botY) * 0.55;
    var bArmY = midY_bot - bArmH/2;
    var bAGrad = ctx.createLinearGradient(armRight, bArmY, W, bArmY+bArmH);
    bAGrad.addColorStop(0, sk1); bAGrad.addColorStop(0.4, sk2); bAGrad.addColorStop(1, sk5);
    ctx.fillStyle = bAGrad;
    ctx.fillRect(armRight, bArmY, W-armRight, bArmH);
    ctx.strokeStyle = sk4; ctx.lineWidth = 1;
    for(var ai2=0; ai2<3; ai2++){
      ctx.beginPath();
      ctx.moveTo(armRight, midY_bot + (ai2-1)*10);
      ctx.quadraticCurveTo(armRight+(W-armRight)*0.5, bArmY+bArmH*(0.22+ai2*0.25)+(ai2-1)*4, W, bArmY+bArmH*(0.25+ai2*0.25));
      ctx.stroke();
    }
  }
  // Palm
  var bPalG = ctx.createLinearGradient(p.x, p.botY, p.x+p.bodyW, H-80);
  bPalG.addColorStop(0, sk3); bPalG.addColorStop(0.6, sk1); bPalG.addColorStop(1, sk2);
  ctx.fillStyle = bPalG;
  ctx.fillRect(p.x, p.botY, p.bodyW, H-80-p.botY);
  // Palm creases
  ctx.strokeStyle = sk4; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x+4, midY_bot-8); ctx.quadraticCurveTo(p.x+p.bodyW/2, midY_bot-5, p.x+p.bodyW-4, midY_bot-2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x+4, midY_bot+6); ctx.quadraticCurveTo(p.x+p.bodyW/2, midY_bot+9, p.x+p.bodyW-4, midY_bot+12);
  ctx.stroke();
  // Thumb (on top of palm for right hand)
  ctx.fillStyle = sk1;
  ctx.fillRect(p.x+p.bodyW*0.45-2, p.botY+2, p.bodyW*0.55, 12);
  ctx.strokeStyle = sk4; ctx.lineWidth = 1; ctx.strokeRect(p.x+p.bodyW*0.45-2, p.botY+2, p.bodyW*0.55, 12);
  // 4 Fingers pointing LEFT (extending into gap from right side)
  var bFStartY = p.botY + 8 + fGap;
  var bFStartX = p.x;
  for(var f2=0; f2<4; f2++){
    finger(bFStartX, bFStartY + f2*(fH+fGap), fLen, fH, -1, f2===0||f2===3);
  }
  // Drop shadow
  ctx.fillStyle = '#00000033';
  ctx.fillRect(p.x-fLen, p.botY-6, p.bodyW+fLen, 6);
}

// ─── drawObstacle — dispatcher ────────────────
function drawObstacle(p) {
  var pi = getPhaseIdx();
  var pv = getPhaseVisual();
  if(pi === 0 || pi === 1 || pi >= 5) {
    drawCandle(p, pv.candleUp, pv.candleDown);
  } else if(pi === 2) {
    drawTreeObstacle(p);
  } else if(pi === 3) {
    drawMountainObstacle(p);
  } else if(pi === 4) {
    drawTitanHand(p);
  }
}

// ─── BACKGROUND HELPERS ───────────────────────
function drawGround(pv) {
  var gnd = ctx.createLinearGradient(0, H-80, 0, H);
  gnd.addColorStop(0, pv.groundColor);
  gnd.addColorStop(1, '#00000088');
  ctx.fillStyle = gnd; ctx.fillRect(0, H-80, W, 80);
  ctx.shadowColor = pv.groundLine; ctx.shadowBlur = 6;
  ctx.fillStyle = pv.groundLine; ctx.fillRect(0, H-80, W, 2);
  ctx.shadowBlur = 0;
}

function drawTicker(pv) {
  ctx.fillStyle = '#000000dd'; ctx.fillRect(0, 0, W, 20);
  // separator line
  ctx.fillStyle = pv.glowColor + '44'; ctx.fillRect(0, 20, W, 1);
  var ph = getPhase();
  // Phase — left side
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 4;
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText(ph.label, 6, 14);
  ctx.shadowBlur = 0;
  // Scene name — center
  ctx.fillStyle = pv.glowColor + 'cc'; ctx.font = '8px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(pv.name, W/2, 14);
  // $BLEU tag — right
  ctx.fillStyle = pv.glowColor; ctx.font = '8px Courier New'; ctx.textAlign = 'right';
  ctx.fillText('$BLEU +6900%', W-6, 14);
}

function drawStarField(count, alpha) {
  ctx.fillStyle = '#ffffff';
  for(var i = 0; i < count; i++) {
    var sx = (i * 127 + frame * 0.2) % W;
    var sy = (i * 83) % (H-80);
    var ss = 0.5 + (i % 3) * 0.5;
    ctx.globalAlpha = alpha * (0.5 + (i%4)*0.12);
    ctx.beginPath(); ctx.arc(sx, sy, ss, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawClouds(alphaScale) {
  ctx.fillStyle = '#ffffff';
  for(var i = 0; i < 5; i++) {
    var cx = W + 80 - ((i*160 + frame*0.5) % (W+200));
    var cy = 45 + i * 58 + Math.sin(frame*0.009 + i) * 10;
    var r  = 18 + (i%3)*11;
    ctx.save();
    ctx.globalAlpha = alphaScale * (0.55 + (i%3)*0.18);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.arc(cx + r*0.9,  cy - r*0.35, r*0.65, 0, Math.PI*2);
    ctx.arc(cx + r*1.75, cy,           r*0.75, 0, Math.PI*2);
    ctx.arc(cx + r*0.8,  cy + r*0.3,  r*0.55, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSnowflakes() {
  for(var i = 0; i < 28; i++) {
    var sx = ((i*173 + frame*(0.5 + (i%5)*0.15)) % W + W) % W;
    var sy = ((i*97  + frame*(1.3 + (i%3)*0.3)) % (H-80) + H-80) % (H-80);
    var ss = 1.4 + (i%3)*0.7;
    ctx.globalAlpha = 0.25 + (i%5)*0.08;
    ctx.fillStyle = '#e8f4ff';
    ctx.beginPath(); ctx.arc(sx, sy, ss, 0, Math.PI*2); ctx.fill();
    // sparkle cross on bigger flakes
    if(ss > 2) {
      ctx.strokeStyle = '#c0ddf0'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(sx-ss*1.4, sy); ctx.lineTo(sx+ss*1.4, sy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, sy-ss*1.4); ctx.lineTo(sx, sy+ss*1.4); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

function drawForestTrees() {
  var trees = [
    {ox:20, h:120, w:50}, {ox:90, h:90,  w:40},
    {ox:170,h:145, w:56}, {ox:248,h:105, w:44},
    {ox:318,h:125, w:52}, {ox:372,h:84,  w:36},
  ];
  for(var t = 0; t < trees.length; t++) {
    var tx = ((trees[t].ox - frame*0.15) % (W+90) + W+90) % (W+90) - 45;
    var th = trees[t].h, tw = trees[t].w;
    var tcx = tx + tw/2;
    // trunk
    ctx.fillStyle = '#6D4C41';
    ctx.fillRect(tcx - 6, H-80-th*0.3, 12, th*0.3);
    ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 1.5;
    ctx.strokeRect(tcx - 6, H-80-th*0.3, 12, th*0.3);
    // foliage layer 1 — bottom widest, bright green + outline
    ctx.fillStyle = '#43A047';
    ctx.beginPath(); ctx.moveTo(tx-2,H-80-th*0.28); ctx.lineTo(tcx,H-80-th*0.68); ctx.lineTo(tx+tw+2,H-80-th*0.28); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#76D275'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(tx-2,H-80-th*0.28); ctx.lineTo(tcx,H-80-th*0.68); ctx.lineTo(tx+tw+2,H-80-th*0.28); ctx.closePath(); ctx.stroke();
    // foliage layer 2 — mid
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath(); ctx.moveTo(tx+4,H-80-th*0.54); ctx.lineTo(tcx,H-80-th*0.88); ctx.lineTo(tx+tw-4,H-80-th*0.54); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#81C784'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(tx+4,H-80-th*0.54); ctx.lineTo(tcx,H-80-th*0.88); ctx.lineTo(tx+tw-4,H-80-th*0.54); ctx.closePath(); ctx.stroke();
    // foliage layer 3 — top brightest
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath(); ctx.moveTo(tx+10,H-80-th*0.8); ctx.lineTo(tcx,H-80-th); ctx.lineTo(tx+tw-10,H-80-th*0.8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#A5D6A7'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx+10,H-80-th*0.8); ctx.lineTo(tcx,H-80-th); ctx.lineTo(tx+tw-10,H-80-th*0.8); ctx.closePath(); ctx.stroke();
    // snow tip
    ctx.fillStyle = '#dff0ff99';
    ctx.beginPath(); ctx.moveTo(tcx-7,H-80-th*0.93); ctx.lineTo(tcx,H-80-th); ctx.lineTo(tcx+7,H-80-th*0.93); ctx.closePath(); ctx.fill();
  }
}

function drawMountainBackground() {
  // far mountains (lighter)
  ctx.fillStyle = '#4a6fa5';
  var mts = [{x:0,h:220,w:160},{x:120,h:180,w:140},{x:230,h:250,w:180},{x:350,h:200,w:160}];
  for(var m = 0; m < mts.length; m++) {
    var mt = mts[m];
    var mx = ((mt.x - frame*0.08) % (W+200) + W+200) % (W+200) - 80;
    ctx.beginPath();
    ctx.moveTo(mx, H-80);
    ctx.lineTo(mx + mt.w/2, H-80-mt.h);
    ctx.lineTo(mx + mt.w, H-80);
    ctx.closePath(); ctx.fill();
    // snow
    ctx.fillStyle = '#ffffffaa';
    ctx.beginPath();
    ctx.moveTo(mx+mt.w/2-20, H-80-mt.h*0.8);
    ctx.lineTo(mx+mt.w/2, H-80-mt.h);
    ctx.lineTo(mx+mt.w/2+20, H-80-mt.h*0.8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#4a6fa5';
  }
  // near mountains (darker)
  ctx.fillStyle = '#2d4a6e';
  var mts2 = [{x:60,h:160,w:130},{x:200,h:140,w:120},{x:310,h:170,w:140},{x:460,h:150,w:130}];
  for(var m2 = 0; m2 < mts2.length; m2++) {
    var mt2 = mts2[m2];
    var mx2 = ((mt2.x - frame*0.18) % (W+200) + W+200) % (W+200) - 80;
    ctx.beginPath();
    ctx.moveTo(mx2, H-80);
    ctx.lineTo(mx2 + mt2.w/2, H-80-mt2.h);
    ctx.lineTo(mx2 + mt2.w, H-80);
    ctx.closePath(); ctx.fill();
    // snow
    ctx.fillStyle = '#ffffffcc';
    ctx.beginPath();
    ctx.moveTo(mx2+mt2.w/2-14, H-80-mt2.h*0.82);
    ctx.lineTo(mx2+mt2.w/2, H-80-mt2.h);
    ctx.lineTo(mx2+mt2.w/2+14, H-80-mt2.h*0.82);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2d4a6e';
  }
}

function drawHeavenRays() {
  // Divine golden rays from top center
  ctx.save();
  for(var r = 0; r < 10; r++) {
    var angle = (r * Math.PI / 5) + frame * 0.003;
    var ray = ctx.createLinearGradient(W/2, 0, W/2 + Math.cos(angle)*300, Math.sin(angle)*300);
    ray.addColorStop(0, '#FFD70044'); ray.addColorStop(1, '#FFD70000');
    ctx.fillStyle = ray;
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2 + Math.cos(angle-0.08)*320, Math.sin(angle-0.08)*320);
    ctx.lineTo(W/2 + Math.cos(angle+0.08)*320, Math.sin(angle+0.08)*320);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawHeavenPillars() {
  // Stone pillars in background (medieval)
  var pillarData = [{x:15,w:28},{x:355,w:28},{x:80,w:20},{x:290,w:20}];
  for(var pi = 0; pi < pillarData.length; pi++) {
    var pd = pillarData[pi];
    var pg = ctx.createLinearGradient(pd.x, 0, pd.x+pd.w, 0);
    pg.addColorStop(0,'#3a3520'); pg.addColorStop(0.4,'#6a6040'); pg.addColorStop(1,'#2a2518');
    ctx.fillStyle = pg;
    ctx.fillRect(pd.x, 30, pd.w, H-110);
    // capital (top decoration)
    ctx.fillStyle = '#8a7a50';
    ctx.fillRect(pd.x-4, 28, pd.w+8, 10);
    // column fluting lines
    ctx.strokeStyle = '#2a250880'; ctx.lineWidth = 1;
    for(var fl = 0; fl < 3; fl++) {
      var fx = pd.x + (fl+1)*(pd.w/4);
      ctx.beginPath(); ctx.moveTo(fx, 38); ctx.lineTo(fx, H-82); ctx.stroke();
    }
    // golden glow
    ctx.shadowColor = '#FFD70033'; ctx.shadowBlur = 12;
    ctx.strokeStyle = '#FFD70055'; ctx.lineWidth = 1;
    ctx.strokeRect(pd.x, 30, pd.w, H-110);
    ctx.shadowBlur = 0;
  }
}

function drawBaseHexPattern() {
  // Subtle Base logo / hex grid
  ctx.strokeStyle = '#0052FF11'; ctx.lineWidth = 1;
  var hx = 34, hy = 38;
  for(var gx = -hx; gx < W+hx; gx += hx*1.5) {
    for(var gy = 22; gy < H-80; gy += hy) {
      var offx = (Math.floor(gy/hy) % 2) * hx*0.75;
      var hcx = gx + offx + ((frame*0.08)%(hx*1.5));
      ctx.beginPath();
      for(var he = 0; he < 6; he++) {
        var ha = he * Math.PI/3;
        var hpx = hcx + 14*Math.cos(ha), hpy = gy + 16*Math.sin(ha);
        he===0 ? ctx.moveTo(hpx,hpy) : ctx.lineTo(hpx,hpy);
      }
      ctx.closePath(); ctx.stroke();
    }
  }
}

// ─── MAIN BACKGROUND DRAW ────────────────────
function drawBg() {
  var pv = getPhaseVisual();
  var pi = getPhaseIdx();

  // Base gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, pv.bg[0]); g.addColorStop(1, pv.bg[1]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // ── Phase-specific background elements ──
  if(pi === 0) {
    // PERPDEX TERMINAL — matrix grid + chart silhouette
    ctx.strokeStyle = '#00ff4109'; ctx.lineWidth = 0.5;
    for(var gxi=0; gxi<W; gxi+=20){ ctx.beginPath(); ctx.moveTo(gxi,22); ctx.lineTo(gxi,H); ctx.stroke(); }
    for(var gyi=22; gyi<H; gyi+=20){ ctx.beginPath(); ctx.moveTo(0,gyi); ctx.lineTo(W,gyi); ctx.stroke(); }
    // chart line
    ctx.strokeStyle = '#00ff4120'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for(var cx2=0; cx2<=W; cx2+=4) {
      var cy2 = H*0.42 + Math.sin((cx2+frame*0.4)*0.04)*55 + Math.cos((cx2+frame*0.22)*0.025)*30;
      cx2===0 ? ctx.moveTo(cx2,cy2) : ctx.lineTo(cx2,cy2);
    }
    ctx.stroke();
    // matrix chars
    ctx.font = '9px Courier New';
    var chars = ['0','1','$','%','+','8','3','-'];
    for(var mi=0; mi<14; mi++) {
      var mx3 = (mi*37+3) % W;
      var my3 = ((mi*83 + frame*(1+(mi%3))) % (H-100) + H-100) % (H-100) + 22;
      ctx.globalAlpha = 0.1 + (mi%4)*0.04;
      ctx.fillStyle = '#00ff41';
      ctx.fillText(chars[(mi+Math.floor(frame/18+mi))%chars.length], mx3, my3);
    }
    ctx.globalAlpha = 1;

  } else if(pi === 1) {
    // BASE NETWORK — hex pattern + clouds
    drawBaseHexPattern();
    drawClouds(0.12);
    drawStarField(20, 0.06);

  } else if(pi === 2) {
    // CRYPTO FOREST — trees + snow
    drawForestTrees();
    // lake strip
    var lakeY = H - 180;
    var lake = ctx.createLinearGradient(0, lakeY, 0, lakeY+40);
    lake.addColorStop(0, '#1a3a4a66'); lake.addColorStop(1, '#0a1e2a44');
    ctx.fillStyle = lake; ctx.fillRect(0, lakeY, W, 40);
    ctx.strokeStyle = '#4a8aaa55'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,lakeY); ctx.lineTo(W,lakeY); ctx.stroke();
    // cold fog overlay at bottom
    var fog = ctx.createLinearGradient(0, H-200, 0, H-80);
    fog.addColorStop(0,'transparent'); fog.addColorStop(1,'#b0d8f020');
    ctx.fillStyle = fog; ctx.fillRect(0, H-200, W, 120);
    drawSnowflakes();

  } else if(pi === 3) {
    // SKY — mountains + clouds + sun
    // Sun glow
    var sunG = ctx.createRadialGradient(W-60, 80, 5, W-60, 80, 90);
    sunG.addColorStop(0,'#FFE06688'); sunG.addColorStop(0.4,'#FFE06622'); sunG.addColorStop(1,'transparent');
    ctx.fillStyle = sunG; ctx.fillRect(0, 0, W, H);
    drawMountainBackground();
    drawClouds(0.22);

  } else if(pi === 4) {
    // HEAVEN'S GATE — rays + pillars + clouds
    drawHeavenRays();
    drawHeavenPillars();
    drawClouds(0.25);
    // golden mist at ground
    var mist = ctx.createLinearGradient(0, H-200, 0, H-80);
    mist.addColorStop(0,'transparent'); mist.addColorStop(1,'#FFD70028');
    ctx.fillStyle = mist; ctx.fillRect(0, H-200, W, 120);

  } else {
    // SPACE phases — star field + grid
    drawStarField(45, 0.18);
    ctx.strokeStyle = pv.glowColor + '0e'; ctx.lineWidth = 0.5;
    for(var gxs=0; gxs<W; gxs+=40){ ctx.beginPath(); ctx.moveTo(gxs,0); ctx.lineTo(gxs,H); ctx.stroke(); }
    for(var gys=0; gys<H; gys+=40){ ctx.beginPath(); ctx.moveTo(0,gys); ctx.lineTo(W,gys); ctx.stroke(); }
  }

  // Ticker top bar
  drawTicker(pv);

  // Ground
  drawGround(pv);

  // Phase name bottom-right
  ctx.fillStyle = pv.glowColor + '55'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(pv.name, W-10, H-62);
}

// ─── BANNER DE FASE — topo compacto ──────────
function drawPhaseBanner() {
  if(phaseFlash <= 0) return;
  phaseFlash--;
  var ph    = getPhase();
  var pv    = getPhaseVisual();
  var alpha = phaseFlash > 90 ? 1 : phaseFlash / 90;
  ctx.save();
  ctx.globalAlpha = alpha;
  // Slim bar just below the ticker (ticker is 20px tall)
  ctx.fillStyle = '#000000ee';
  ctx.fillRect(0, 21, W, 24);
  // Glow border bottom
  ctx.shadowColor = pv.glowColor; ctx.shadowBlur = 8;
  ctx.fillStyle = pv.glowColor;
  ctx.fillRect(0, 44, W, 1);
  ctx.shadowBlur = 0;
  // Left: phase label
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 10px Courier New';
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 6;
  ctx.fillText(ph.label, 8, 37);
  ctx.shadowBlur = 0;
  // Center: scene name with glow
  ctx.textAlign = 'center';
  ctx.fillStyle = pv.glowColor; ctx.font = 'bold 10px Courier New';
  ctx.shadowColor = pv.glowColor; ctx.shadowBlur = 10;
  ctx.fillText(pv.name, W/2, 37);
  ctx.shadowBlur = 0;
  // Right: speed
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffffff88'; ctx.font = '9px Courier New';
  ctx.fillText('spd ' + ph.speed.toFixed(1) + 'x', W-8, 37);
  ctx.restore();
}

// ─── PARTÍCULAS ──────────────────────────────
function spawnParticles(x, y, color, n) {
  n = n || 14;
  for(var i=0; i<n; i++)
    particles.push({x:x, y:y, vx:(Math.random()-.5)*7, vy:(Math.random()-.5)*7, life:50, color:color});
}
function updateParticles() {
  particles = particles.filter(function(p){ return p.life>0; });
  for(var i=0; i<particles.length; i++){
    var p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

// ─── COLISÃO ─────────────────────────────────
function hitTest() {
  var r = 14;
  for(var i=0; i<pipes.length; i++){
    var p = pipes[i];
    if(bleu.x+r > p.x && bleu.x-r < p.x+p.bodyW){
      if(bleu.y-r < p.topH) return true;
      if(bleu.y+r > p.botY) return true;
    }
  }
  return bleu.y+r > H-80 || bleu.y-r < 22;
}

// ─── LOOP PRINCIPAL ──────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frame++;
  drawBg();

  // ── IDLE ──
  if(gameState === 'idle'){
    drawCharacter(bleu.x, bleu.y + Math.sin(frame*.045)*8, frame*.22, 0);
    ctx.textAlign = 'center';
    ctx.font = 'bold 34px Courier New';
    var tg = ctx.createLinearGradient(W/2-80, 0, W/2+80, 0);
    tg.addColorStop(0,'#0052FF'); tg.addColorStop(0.5,'#00D4FF'); tg.addColorStop(1,'#FFD700');
    ctx.fillStyle = tg;
    ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 28;
    ctx.fillText('FLAPY BLEU', W/2, H/2-82);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px Courier New';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
    ctx.fillText('$BLEU  *  BASE NETWORK  *  TO THE MOON', W/2, H/2-56);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff88'; ctx.font = '13px Courier New';
    ctx.fillText('tap / SPACE to fly', W/2, H/2-26);
    ctx.fillStyle = '#ffffff44'; ctx.font = '10px Courier New';
    ctx.fillText('dodge the candles  *  ride the charts', W/2, H/2-4);
    ctx.fillStyle = '#ffffff22'; ctx.font = '10px Courier New';
    ctx.fillText('PerpDex  *  Base  *  Forest  *  Sky  *  Heaven', W/2, H/2+18);
    if(highScore > 0){
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px Courier New';
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
      ctx.fillText('BEST: ' + highScore, W/2, H/2+46);
      ctx.shadowBlur = 0;
    }
    drawCharSelect();
    ctx.fillStyle = '#0052FF88'; ctx.font = '10px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('powered by Base Network', W/2, H-95);
    return;
  }

  // ── PLAYING ──
  if(gameState === 'playing'){
    bleu.vy   += 0.38;
    bleu.y    += bleu.vy;
    bleu.flap += 0.25;

    var ph  = getPhase();
    var pi  = getPhaseIdx();
    var pv  = getPhaseVisual();

    // spawn de pipes
    var spawnEvery = Math.max(60, 92 - pi * 3);
    if(frame % spawnEvery === 0){
      pipes.push(makePipe(W+10));
    }

    // move pipes
    var spd = ph.speed;
    for(var i=0; i<pipes.length; i++){
      var p = pipes[i];
      p.x -= spd;
      if(!p.passed && p.x+p.bodyW < bleu.x){
        p.passed = true; score++;
        beep(523, 1047, 0.22, 'sine', 0.14);
        spawnParticles(bleu.x, bleu.y, '#FFD700', 10);
        spawnParticles(bleu.x, bleu.y, pv.glowColor, 6);

        // phase change detection
        var newPI = getPhaseIdx();
        if(newPI > lastPhaseIdx) {
          lastPhaseIdx = newPI;
          phaseFlash   = 150;
          spawnParticles(W/2, H/2, '#FFD700', 30);
          spawnParticles(W/2, H/2, '#00D4FF', 20);
          var fs = [440,554,659,880];
          fs.forEach(function(f,ii){ setTimeout(function(){ beep(f,f*1.5,0.2,'sine',0.18); }, ii*80); });
          // NFT unlock at phase 10 (score >= 100 in test mode)
          if(newPI >= 9 && unlockedChars < 2) { // phase 10 reached (score >= 36 in test mode)
            unlockedChars = 2;
            localStorage.setItem('bleuChars', '2');
            nftFlash = 220;
            spawnParticles(W/2, H/2, '#FF6B20', 40);
            spawnParticles(W/2, H/2, '#FFD700', 40);
            [523,659,784,1047,1319].forEach(function(f,ii){
              setTimeout(function(){ beep(f,f*1.2,0.25,'sine',0.2); }, ii*100);
            });
          }
        }
      }
    }
    pipes = pipes.filter(function(p){ return p.x > -70; });

    for(var i=0; i<pipes.length; i++) drawObstacle(pipes[i]);
    drawCharacter(bleu.x, bleu.y, bleu.flap, bleu.vy);
    updateParticles();
    drawPhaseBanner();
    drawNFTBanner();

    // HUD — score
    ctx.textAlign = 'center';
    ctx.font = 'bold 26px Courier New';
    ctx.shadowColor = pv.glowColor; ctx.shadowBlur = 14;
    ctx.fillStyle = pv.glowColor;
    ctx.fillText(score, W/2, 52);
    ctx.shadowBlur = 0;
    // progress bar — top left, below ticker
    var progress = (score % 4) / 4;
    ctx.fillStyle = '#ffffff14';
    ctx.fillRect(6, 23, 70, 3);
    var barG = ctx.createLinearGradient(6, 23, 76, 23);
    barG.addColorStop(0,'#FFD700'); barG.addColorStop(1,'#00D4FF');
    ctx.fillStyle = barG;
    ctx.fillRect(6, 23, 70 * progress, 3);
    // best
    if(highScore > 0){
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff44'; ctx.font = '10px Courier New';
      ctx.fillText('best ' + highScore, W/2, 68);
    }

    if(hitTest()){
      spawnParticles(bleu.x, bleu.y, '#FF1744', 20);
      spawnParticles(bleu.x, bleu.y, '#FFD700', 10);
      beep(350, 60, 0.5, 'sawtooth', 0.25);
      if(score > highScore){
        highScore = score; newRecord = true;
        localStorage.setItem('bleuHS', highScore);
        [523,659,784,1047].forEach(function(f,i){
          setTimeout(function(){ beep(f,f,0.15,'sine',0.14); }, i*85);
        });
      }
      gameState = 'dead';
    }
  }

  // ── DEAD ──
  if(gameState === 'dead'){
    for(var i=0; i<pipes.length; i++) drawObstacle(pipes[i]);
    drawCharacter(bleu.x, bleu.y+4, bleu.flap, bleu.vy);
    updateParticles();
    ctx.textAlign = 'center';
    if(newRecord){
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 15px Courier New';
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 24;
      ctx.fillText('NEW RECORD!', W/2, H/2-92);
      ctx.shadowBlur = 0;
    }
    ctx.font = 'bold 30px Courier New';
    ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 24;
    ctx.fillStyle = '#FF1744';
    ctx.fillText('REKT', W/2, H/2-50);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = '20px Courier New';
    ctx.fillText('Score: ' + score, W/2, H/2-10);
    ctx.fillStyle = '#00D4FF'; ctx.font = 'bold 12px Courier New';
    ctx.fillText(getPhase().label + ' reached', W/2, H/2+12);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px Courier New';
    ctx.shadowColor = '#FFD70066'; ctx.shadowBlur = 10;
    ctx.fillText('Best: ' + highScore, W/2, H/2+32);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0052FF99'; ctx.font = '13px Courier New';
    ctx.fillText('tap / SPACE to retry', W/2, H/2+56);
    ctx.fillStyle = '#FFD700'; ctx.font = '11px Courier New';
    ctx.fillText('$BLEU never stops', W/2, H/2+74);
  }
}

// ─── INPUT ───────────────────────────────────
function flap() {
  if(gameState==='idle')         { gameState='playing'; }
  else if(gameState==='playing') { bleu.vy=-7.5; bleu.flap=-1; beep(260,520,0.09,'sine',0.16); }
  else if(gameState==='dead')    { resetGame(); gameState='playing'; }
}

function handleClick(ex, ey) {
  // Character select buttons in idle screen
  if(gameState === 'idle' && unlockedChars >= 2) {
    var bx1 = W/2 - 55, bx2 = W/2 + 15, by = H/2+80, bw = 40, bh = 16;
    // Need canvas-relative coords
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width, scaleY = H / rect.height;
    var cx2 = (ex - rect.left) * scaleX;
    var cy2 = (ey - rect.top)  * scaleY;
    if(cx2>=bx1 && cx2<=bx1+bw && cy2>=by && cy2<=by+bh) {
      activeChar = 0; localStorage.setItem('bleuActiveChar','0');
      beep(440,880,0.1,'sine',0.12); return;
    }
    if(cx2>=bx2 && cx2<=bx2+bw && cy2>=by && cy2<=by+bh) {
      activeChar = 1; localStorage.setItem('bleuActiveChar','1');
      beep(660,1320,0.1,'sine',0.12); return;
    }
  }
  flap();
}

canvas.addEventListener('click', function(e){ handleClick(e.clientX, e.clientY); });
document.addEventListener('keydown', function(e){ if(e.code==='Space'){ e.preventDefault(); flap(); } });
canvas.addEventListener('touchstart', function(e){ e.preventDefault(); handleClick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

loop();
</script>
