  canvas {
    border: 2px solid #0052FF;
    border-radius: 8px;

  #ui { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); color: #0052FF; font-size: clamp(10px, 3vw, 13px); text-align: center; text-shadow: 0 0 10px #0052FF; white-space: nowrap; pointer-events: none; z-index: 10; }
  #mute { position: fixed; bottom: 14px; right: 14px; background: #0052FF18; border: 1px solid #0052FF44; color: #0052FF; font-family: 'Courier New', monospace; font-size: 12px; padding: 10px 14px; border-radius: 6px; cursor: pointer; touch-action: manipulation; z-index: 10; }

<body>
<div id="ui">💎 FLAPY BLEU — tap or SPACE to flap</div>
<canvas id="c" width="400" height="600"></canvas>
<button id="mute">🔊 SOM</button>
<script>
const canvas = document.getElementById('c');
// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    var rr = Math.min(r, w/2, h/2);
    this.moveTo(x+rr, y);
    this.lineTo(x+w-rr, y);
    this.arcTo(x+w,y, x+w,y+rr, rr);
    this.lineTo(x+w, y+h-rr);
    this.arcTo(x+w,y+h, x+w-rr,y+h, rr);
    this.lineTo(x+rr, y+h);
    this.arcTo(x,y+h, x,y+h-rr, rr);
    this.lineTo(x, y+rr);
    this.arcTo(x,y, x+rr,y, rr);
    this.closePath();
  };
}
const ctx = canvas.getContext('2d', {alpha: false});
const W = canvas.width, H = canvas.height;

// ─── AUDIO ───────────────────────────────────
var _ac = null, muted = false;
document.getElementById('mute').onclick = function() {
  muted = !muted;
  document.getElementById('mute').textContent = muted ? '🔇 MUDO' : '🔊 SOM';
  if(muted) stopMusic(); else if(gameState==='playing') startMusic(getPhaseIdx());
};
function getAC() {
  if (!_ac) { try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (_ac && _ac.state === 'suspended') _ac.resume();
  return _ac;
}
function beep(f1, f2, dur, type, vol) {
  if (muted) return;
  var a = getAC(); if (!a) return;
  try {
    var o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(f1, a.currentTime);
    if (f2 && f2 !== f1) o.frequency.exponentialRampToValueAtTime(f2, a.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.2, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(a.currentTime);
    o.stop(a.currentTime + dur + 0.05);
  } catch(e) {}
}

  { speed: 2.4, gap: 148, label: 'PHASE 4'  },
  { speed: 2.4, gap: 148, label: 'PHASE 5'  },
  { speed: 2.4, gap: 148, label: 'PHASE 6'  },
  { speed: 2.4, gap: 148, label: 'PHASE 7'  },
  { speed: 2.4, gap: 148, label: 'PHASE 8'  },
  { speed: 2.4, gap: 185, label: 'PHASE 9'  },
  { speed: 2.4, gap: 148, label: 'PHASE 10' },
]; // ← mesma dificuldade em todas, ajustar depois
function getPhaseIdx() { return Math.min(9, Math.floor(score / 4)); }
function getPhase()    { return PHASES[getPhaseIdx()]; }

// ─── PHASE MUSIC ────────────────────────────────────────────
const PHASE_MUSIC = [
  { n:[110,0,138,165,138,110,0,0, 146,138,165,110,0,138,0,0],  d:120, w:'square',   v:.05  },
  { n:[523,659,784,659,523,0,392,523, 659,784,659,523,440,523,0,0], d:110, w:'sine', v:.055 },
  { n:[349,440,523,440,349,0,294,349, 440,523,698,523,440,349,0,0], d:155, w:'sine', v:.05  },
  { n:[220,0,261,329,261,220,0,196, 0,247,294,247,220,0,196,0], d:195, w:'triangle',v:.055 },
  { n:[262,330,392,523,392,330,262,0, 220,277,330,440,392,330,0,262], d:155, w:'sine', v:.06 },
  { n:[110,0,130,0,146,130,110,0, 98,0,116,130,116,98,0,0],   d:190, w:'sawtooth', v:.04  },
  { n:[440,0,554,659,0,880,659,554, 440,0,659,880,0,659,554,0], d:95, w:'square',   v:.045 },
  { n:[294,330,370,440,370,330,294,0, 247,294,330,370,330,294,0,0], d:175, w:'sine', v:.055 },
  { n:[185,0,207,246,220,185,0,174, 0,207,0,185,174,0,185,0], d:215, w:'sine',     v:.045 },
  { n:[523,659,784,880,1047,880,784,659, 523,0,659,784,880,1047,880,0], d:105, w:'sine', v:.06 }
];
function startMusic(pi) {
  if (_mPhase === pi) return;
  stopMusic(); _mPhase = pi; _mPos = 0; _tickMusic();
}
function stopMusic() { clearTimeout(_mTimeout); _mTimeout = null; _mPhase = -1; }
function _tickMusic() {
  if (_mPhase < 0 || muted) return;
  var pm = PHASE_MUSIC[_mPhase], f = pm.n[_mPos % pm.n.length];
  if (f > 0) {
    var a = getAC();
    if (a) try {
      var o = a.createOscillator(), g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = pm.w; o.frequency.value = f;
      g.gain.setValueAtTime(pm.v, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + pm.d/1000*.8);
      o.start(a.currentTime); o.stop(a.currentTime + pm.d/1000);
    } catch(e) {}
  }
  _mPos++;
  _mTimeout = setTimeout(_tickMusic, pm.d);
}

// ─── AWARD / CHEST ──────────────────────────────────────────
function chestCoinsRand() {
  return Math.floor(10 + 90 * Math.pow(Math.random(), 1.8));
}
function drawTreasureChest(cx, cy, opened, openAnim) {
  ctx.save(); ctx.translate(cx, cy);
  var bw=90, bh=52, lidH=26;
  ctx.globalAlpha=.3; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(2,bh+7,bw/2-4,9,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  var bg=ctx.createLinearGradient(0,0,0,bh);
  bg.addColorStop(0,'#8B5A2B'); bg.addColorStop(1,'#4a2c10');
  ctx.fillStyle=bg; ctx.strokeStyle='#2a1a08'; ctx.lineWidth=2;
  ctx.fillRect(-bw/2,0,bw,bh); ctx.strokeRect(-bw/2,0,bw,bh);
  ctx.strokeStyle='#3a2010'; ctx.lineWidth=1;
  [-1,0,1].forEach(function(xi){ ctx.beginPath(); ctx.moveTo(xi*bw/3,0); ctx.lineTo(xi*bw/3,bh); ctx.stroke(); });
  ctx.fillStyle='#C8960C'; ctx.fillRect(-bw/2,bh*.43,bw,6);
  ctx.save();
  ctx.translate(-bw/2, 0);
  ctx.rotate(opened ? -Math.PI*.78*Math.min(1,openAnim/14) : 0);
  var lg=ctx.createLinearGradient(0,-lidH,0,0);
  lg.addColorStop(0,'#a06030'); lg.addColorStop(1,'#7a4a20');
  ctx.fillStyle=lg; ctx.strokeStyle='#2a1a08'; ctx.lineWidth=2;
  ctx.fillRect(0,-lidH,bw,lidH); ctx.strokeRect(0,-lidH,bw,lidH);
  ctx.fillStyle='#b07030';
  ctx.beginPath(); ctx.ellipse(bw/2,-lidH,bw/2,10,0,Math.PI,0); ctx.fill();
  ctx.strokeStyle='#2a1a08'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(bw/2,-lidH,bw/2,10,0,Math.PI,0); ctx.stroke();
  ctx.fillStyle='#C8960C'; ctx.fillRect(0,-lidH*.55,bw,5);
  ctx.restore();
  if (opened && openAnim>3) {
    var gp=Math.min(1,(openAnim-3)/8);
    ctx.globalAlpha=gp*.7;
    var ig=ctx.createRadialGradient(0,bh*.4,2,0,bh*.4,bw*.5);
    ig.addColorStop(0,'#FFE040'); ig.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=ig; ctx.fillRect(-bw/2+3,3,bw-6,bh-6);
    ctx.globalAlpha=1;
    if (openAnim>7) {
      var nc=Math.min(openAnim-7,8);
      for (var ci=0;ci<nc;ci++) {
        var ca=(ci/8)*Math.PI*1.6+.2;
        ctx.beginPath(); ctx.arc(Math.cos(ca-Math.PI/2)*22,bh*.4+Math.sin(ca)*12,5,0,Math.PI*2);
        ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=10; ctx.fill();
      }
      ctx.shadowBlur=0;
    }
  }
  var la=(opened&&openAnim>3)?Math.max(0,1-(openAnim-3)/4):1;
  if (la>0) {
    ctx.globalAlpha=la;
    ctx.fillStyle='#C8960C'; ctx.strokeStyle='#7a5a00'; ctx.lineWidth=1.5;
    ctx.fillRect(-11,bh*.4-10,22,18); ctx.strokeRect(-11,bh*.4-10,22,18);
    ctx.fillStyle='#4a2c10';
    ctx.beginPath(); ctx.arc(0,bh*.4-4,4,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-2.5,bh*.4-4,5,8);
    ctx.globalAlpha=1;
  }
  ctx.strokeStyle='#C8960C'; ctx.lineWidth=2.5;
  ctx.strokeRect(-bw/2+1,1,bw-2,bh-2);
  ctx.restore();
}
function drawAwardScreen() {
  ctx.fillStyle='rgba(0,5,20,.84)'; ctx.fillRect(0,0,W,H);
  var cx=W/2, cy=H/2+10;
  ctx.textAlign='center';
  ctx.font='bold 17px Courier New';
  var tg=ctx.createLinearGradient(cx-80,0,cx+80,0);
  tg.addColorStop(0,'#FFD700'); tg.addColorStop(1,'#00D4FF');
  ctx.fillStyle=tg; ctx.shadowColor='#FFD700'; ctx.shadowBlur=18;
  var aTitle=chestType==='rare'?'⭐ FASE ÉPICA COMPLETA! ⭐':'PHASE '+(completedPhase+1)+' COMPLETE!';
  ctx.fillText(aTitle, cx, cy-140);
  ctx.shadowBlur=0;
  var bOff=chestBounce>0?-Math.abs(Math.sin(chestBounce/12*Math.PI))*22:0;
  if(chestBounce>0) chestBounce--;
  drawTreasureChest(cx, cy-28+bOff, chestOpened, chestOpenAnim);
  if(chestOpened && chestOpenAnim<20) chestOpenAnim++;
  if (!chestOpened) {
    for(var di=0;di<3;di++) {
      ctx.beginPath(); ctx.arc(cx-20+di*20,cy+48,5,0,Math.PI*2);
      ctx.fillStyle=di<chestClicks?'#FFD700':'#ffffff22';
      ctx.shadowColor=di<chestClicks?'#FFD700':'transparent'; ctx.shadowBlur=8;
      ctx.fill(); ctx.shadowBlur=0;
    }
    ctx.font='12px Courier New'; ctx.fillStyle='#ffffff66';
    ctx.fillText('clique o baú para abrir', cx, cy+68);
  }
  if (chestOpened && chestOpenAnim>=14) {
    ctx.font='bold 30px Courier New'; ctx.fillStyle='#FFD700';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=24;
    ctx.fillText('+'+chestCoins, cx, cy+60);
    ctx.shadowBlur=0;
    ctx.font='13px Courier New'; ctx.fillStyle='#88ccff';
    ctx.fillText('moedas do dragão 🐉', cx, cy+82);
    ctx.font='11px Courier New'; ctx.fillStyle='#ffffff55';
    ctx.fillText('toque para continuar', cx, cy+108);
  }
}

// ─── IDLE TABS ───────────────────────────────────────────────
function drawIdleTabs() {
  var labels=['JOGAR','LOJA','SKINS','RANK'], keys=['play','shop','skins','leaderboard'];
  var tw=70, th=26, gap=6, total=labels.length*(tw+gap)-gap;
  var tx0=W/2-total/2, ty=H-72;
  ctx.font='bold 9px Courier New'; ctx.textAlign='center';
  for(var ti=0;ti<labels.length;ti++) {
    var tx=tx0+ti*(tw+gap), act=idleTab===keys[ti];
    ctx.fillStyle=act?'#0052FF':'#0052FF1a';
    ctx.strokeStyle=act?'#0052FF':'#0052FF55'; ctx.lineWidth=1.5;
    ctx.fillRect(tx,ty,tw,th); ctx.strokeRect(tx,ty,tw,th);
    ctx.fillStyle=act?'#fff':'#0052FF88';
    ctx.shadowColor=act?'#00D4FF':'transparent'; ctx.shadowBlur=act?8:0;
    ctx.fillText(labels[ti],tx+tw/2,ty+17); ctx.shadowBlur=0;
  }
}
function drawShopCards(yStart, compact) {
  var cols=3, tw=76, th=compact?82:80, gapX=8, gapY=compact?4:5;
  var startX=W/2-((cols*(tw+gapX)-gapX)/2);
  for(var si=1;si<SKINS.length;si++){
    var idx2=si-1, col=idx2%cols, row=Math.floor(idx2/cols);
    var sx=startX+col*(tw+gapX)+tw/2, sy=yStart+row*(th+gapY);
    var sk=SKINS[si], owned=unlockedSkins.indexOf(si)>=0, equipped=activeSkin===si&&owned;
    var canBuy=!owned&&coinCount>=sk.price;
    // card bg
    ctx.fillStyle=equipped?sk.body+'44':owned?sk.body+'1a':'#ffffff08';
    ctx.strokeStyle=equipped?sk.body:owned?sk.body+'66':canBuy?sk.glow+'66':'#ffffff18';
    ctx.lineWidth=equipped?2:1;
    ctx.beginPath(); ctx.roundRect(sx-tw/2,sy,tw,th,6); ctx.fill(); ctx.stroke();
    // character preview
    var prevSkin=activeSkin; activeSkin=si;
    ctx.save(); ctx.translate(sx,sy+(compact?28:28)); ctx.scale(.44,.44);
    drawBleu(0,0,frame*.28,0); ctx.restore(); activeSkin=prevSkin;
    // name
    ctx.textAlign='center'; ctx.font='bold 8px Courier New';
    ctx.fillStyle=owned?'#fff':'#ffffffaa'; ctx.fillText(sk.name,sx,sy+th-18);
    // buy/equip button
    var btnY=sy+th-12;
    if(owned){
      ctx.fillStyle=equipped?sk.body+'33':'#ffffff0a';
      ctx.strokeStyle=equipped?sk.body:'#ffffff22'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(sx-tw/2+4,btnY,tw-8,10,3); ctx.fill(); ctx.stroke();
      ctx.font='6px Courier New'; ctx.fillStyle=equipped?sk.body:'#ffffff66';
      ctx.fillText(equipped?'✓ EQUIPADA':'EQUIPAR',sx,btnY+7);
    } else {
      ctx.fillStyle=canBuy?'#FFD70020':'#ff000018';
      ctx.strokeStyle=canBuy?'#FFD700':'#ff4444'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(sx-tw/2+4,btnY,tw-8,10,3); ctx.fill(); ctx.stroke();
      ctx.font='6px Courier New'; ctx.fillStyle=canBuy?'#FFD700':'#ff6666';
      ctx.fillText('🐉 '+sk.price,sx,btnY+7);
    }
  }
}
function drawShopTab() {

  for(var ii3=0;ii3<3;ii3++){
    var ix2=16+ii3*126, iy2=iy+5;
    ctx.fillStyle='#ffffff04'; ctx.strokeStyle='#FFD70022'; ctx.lineWidth=1;

    ctx.font='7px Courier New'; ctx.fillStyle='#ffffff44';
    ctx.fillText(items2[ii3].name, ix2+66, iy2+14);
    ctx.font='bold 7px Courier New'; ctx.fillStyle='#FFD70044';
    ctx.fillText('EM BREVE', ix2+66, iy2+28);
  }
  ctx.textAlign='center';
}
function drawShopOverlay() {
  ctx.fillStyle='rgba(0,5,20,.92)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 14px Courier New';
  var sg=ctx.createLinearGradient(W/2-70,0,W/2+70,0);
  sg.addColorStop(0,'#FFD700'); sg.addColorStop(1,'#00D4FF');
  ctx.fillStyle=sg; ctx.shadowColor='#FFD700'; ctx.shadowBlur=14;
  ctx.fillText('LOJA — FASE '+(completedPhase+1)+' COMPLETA', W/2, 36); ctx.shadowBlur=0;
  ctx.font='11px Courier New'; ctx.fillStyle='#FFD700';
  ctx.fillText('🐉 '+coinCount+' moedas disponíveis', W/2, 56);
  ctx.font='bold 8px Courier New'; ctx.fillStyle='#00D4FFaa';
  ctx.textAlign='left'; ctx.fillText('💎 SKINS — compra com moedas', 16, 72); ctx.textAlign='center';

var dailyModal=false, dailyDay=1, dailyReward='coins', dailyRewardVal=50;
function checkDailyLogin() {
  var today = new Date().toDateString();
  var dl = JSON.parse(localStorage.getItem('bleuDaily')||'{"date":"","streak":0}');
  if(dl.date===today) return;
  var yest = new Date(); yest.setDate(yest.getDate()-1);
  var streak = dl.date===yest.toDateString() ? dl.streak+1 : 1;
  localStorage.setItem('bleuDaily', JSON.stringify({date:today, streak:streak}));
  dailyDay = ((streak-1)%7)+1;
  if(dailyDay===2)      { dailyReward='chest'; dailyRewardVal=1; }
  else if(dailyDay===3) { dailyReward='skin';  dailyRewardVal=0; }
  else                  { dailyReward='coins'; dailyRewardVal=30+dailyDay*10; }
  dailyModal=true;
}

  if(dailyReward==='coins') { coinCount+=dailyRewardVal; localStorage.setItem('bleuCoins',coinCount); }

}

// ─────────────────────────────────────────────
//  BLEU — personagem principal
// ─────────────────────────────────────────────
function drawBleu(x, y, flapAnim, vy) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.max(-0.35, Math.min(0.45, vy * 0.028)));

  var wf = Math.sin(flapAnim * 2.4) * 10;
  var sf = Math.sin(flapAnim * 1.2) * 1.2;
  var ff = Math.sin(flapAnim * 3.1);
  var ef = Math.abs(Math.sin(flapAnim * 2.4));

  var sk = SKINS[activeSkin] || SKINS[0];
  var cBody    = sk.body;
  var cBodyLt  = sk.bodyLt;
  var cBelly   = sk.belly;
  var cShadow  = sk.shadow;
  var cBlush   = 'rgba(255,160,160,0.55)';
  var cEye     = '#ffffff';
  var cPupil   = '#111111';
  var cOutline = sk.outline;

  ctx.lineJoin = 'round';
  ctx.lineCap  = 'round';

  // BODY
  var bodyGrad = ctx.createRadialGradient(2, -4, 4, 2, -4, 22);
  bodyGrad.addColorStop(0, cBodyLt);
  bodyGrad.addColorStop(0.55, cBody);
  bodyGrad.addColorStop(1, cShadow);
  ctx.beginPath();
  ctx.ellipse(0, 4 + sf, 20, 16, -0.1, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad; ctx.fill();
  ctx.lineWidth = 1.8; ctx.strokeStyle = cOutline; ctx.stroke();

  // Belly patch
  ctx.beginPath();
  ctx.ellipse(5, 8 + sf, 11, 9, 0.15, 0, Math.PI * 2);
  ctx.fillStyle = cBelly; ctx.globalAlpha = 0.75; ctx.fill(); ctx.globalAlpha = 1;

  // WING
  ctx.save();
  ctx.translate(2, -4 + sf);
  ctx.rotate((-0.4 + wf * 0.045) * Math.PI);
  var wGrad = ctx.createLinearGradient(0, 0, 0, -28);
  wGrad.addColorStop(0, cBody); wGrad.addColorStop(1, cBodyLt);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-6, -14, 4, -28, 12, -22);
  ctx.bezierCurveTo(16, -18, 14, -8, 0, 0);
  ctx.fillStyle = wGrad; ctx.fill();
  ctx.lineWidth = 1.5; ctx.strokeStyle = cOutline; ctx.stroke();
  ctx.lineWidth = 0.8; ctx.strokeStyle = cShadow; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(2,-10,8,-18,11,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-2,-10,5,-20,10,-22); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();

  // HEAD
  var headGrad = ctx.createRadialGradient(-2, -18, 3, -2, -18, 18);
  headGrad.addColorStop(0, cBodyLt);
  headGrad.addColorStop(0.6, cBody);
  headGrad.addColorStop(1, cShadow);
  ctx.beginPath();
  ctx.arc(4, -18, 17, 0, Math.PI * 2);
  ctx.fillStyle = headGrad; ctx.fill();
  ctx.lineWidth = 1.8; ctx.strokeStyle = cOutline; ctx.stroke();

  // EARS
  ctx.beginPath();
  ctx.ellipse(-7, -33, 5, 7, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = cBody; ctx.fill();
  ctx.lineWidth = 1.4; ctx.strokeStyle = cOutline; ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(8, -33, 4, 6, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = cBody; ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(-7, -33, 2.5, 4, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,180,200,0.7)'; ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -33, 2, 3.5, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,180,200,0.7)'; ctx.fill();

  // EYES
  var eyeScaleY = ef < 0.08 ? 0.2 : 1;
  ctx.save();
  ctx.translate(-3, -20); ctx.scale(1, eyeScaleY);
  ctx.beginPath(); ctx.ellipse(0, 0, 6.5, 7, 0, 0, Math.PI * 2);
  ctx.fillStyle = cEye; ctx.fill();
  ctx.lineWidth = 1.2; ctx.strokeStyle = cOutline; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0.5, 0.5, 4, 4.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = cPupil; ctx.fill();
  ctx.beginPath(); ctx.arc(-1.5, -2, 1.8, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff'; ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(10, -20); ctx.scale(1, eyeScaleY);
  ctx.beginPath(); ctx.ellipse(0, 0, 5.5, 6.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = cEye; ctx.fill();
  ctx.lineWidth = 1.2; ctx.strokeStyle = cOutline; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0.5, 0.5, 3.5, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = cPupil; ctx.fill();
  ctx.beginPath(); ctx.arc(-1, -2, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff'; ctx.fill();
  ctx.restore();

  // BLUSH
  ctx.beginPath(); ctx.ellipse(-10, -14, 5, 3, 0, 0, Math.PI * 2);
  ctx.fillStyle = cBlush; ctx.fill();
  ctx.beginPath(); ctx.ellipse(16, -14, 4.5, 3, 0, 0, Math.PI * 2);
  ctx.fillStyle = cBlush; ctx.fill();

  // SMILE
  ctx.beginPath(); ctx.arc(4, -12, 7, 0.15, Math.PI - 0.15);
  ctx.lineWidth = 1.8; ctx.strokeStyle = cOutline; ctx.stroke();

  // GLOW
  ctx.save();
  ctx.globalAlpha = 0.13 + ff * 0.05;
  var glowStr = scoreGlow>0 ? 0.3+scoreGlow/15*.4 : 0.13+ff*.05;
  ctx.globalAlpha = glowStr;
  ctx.shadowColor = sk.glow; ctx.shadowBlur = scoreGlow>0 ? 22+scoreGlow*1.5 : 0;
  ctx.beginPath(); ctx.arc(4, -10, 22, 0, Math.PI * 2);
  ctx.fillStyle = sk.glow; ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.restore();
}

function drawBrett_ORIG(x, y, flapAnim, vy) {

  ctx.bezierCurveTo(-R-20, 10+wf, -R-6, 12, -R+2, 8);
  ctx.closePath(); ctx.fill();

  ctx.restore();
  ctx.save();
  const rgw = ctx.createLinearGradient(R+28, wf, R, 5);
  rgw.addColorStop(0, '#FF6600cc'); rgw.addColorStop(1, '#FF220066');
  ctx.fillStyle = rgw;
  ctx.beginPath();
  ctx.moveTo(R-2, 0);
  ctx.bezierCurveTo(R+4, -10+wf, R+18, -16+wf, R+28, -4+wf);
  ctx.bezierCurveTo(R+20, 10+wf, R+6, 12, R-2, 8);
  ctx.closePath(); ctx.fill();

  ctx.restore();

  ctx.shadowColor = '#C0C0C0'; ctx.shadowBlur = 18;
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, R+8, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, R+5, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;

  // CABEÇA laranja
  const hg = ctx.createRadialGradient(-6, -7, 1, 0, 0, R);
  hg.addColorStop(0, '#FF9A5C'); hg.addColorStop(0.45, '#FF6B20'); hg.addColorStop(1, '#CC3300');
  ctx.fillStyle = hg;
  ctx.shadowColor = '#FF6B20'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // ORELHAS TEAL
  ctx.fillStyle = '#00897B';
  ctx.beginPath(); ctx.moveTo(-R+6,-R+5); ctx.lineTo(-R-8,-R-18); ctx.lineTo(-R+14,-R-1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#004D40'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#80CBC4';
  ctx.beginPath(); ctx.moveTo(-R+5,-R+3); ctx.lineTo(-R-4,-R-11); ctx.lineTo(-R+9,-R+1); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#00897B';
  ctx.beginPath(); ctx.moveTo(R-6,-R+5); ctx.lineTo(R+8,-R-18); ctx.lineTo(R-14,-R-1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#004D40'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#80CBC4';
  ctx.beginPath(); ctx.moveTo(R-5,-R+3); ctx.lineTo(R+4,-R-11); ctx.lineTo(R-9,-R+1); ctx.closePath(); ctx.fill();

  // OLHOS — âmbar/dourado
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-10,-4,9,10,0.1,0,Math.PI*2); ctx.fill();
  const li = ctx.createRadialGradient(-11,-5,0,-10,-3,6.5);
  li.addColorStop(0,'#FFB300'); li.addColorStop(0.6,'#FF8F00'); li.addColorStop(1,'#E65100');
  ctx.fillStyle = li;
  ctx.beginPath(); ctx.ellipse(-10,-3,6.5,7.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0010'; ctx.beginPath(); ctx.ellipse(-10,-3,4,5.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-7.5,-7,2.4,2.4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-12,-1.5,1.2,1.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0010'; ctx.beginPath(); ctx.ellipse(-10,-12.8,8.5,2.2,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(10,-4,9,10,-0.1,0,Math.PI*2); ctx.fill();
  const ri = ctx.createRadialGradient(11,-5,0,10,-3,6.5);
  ri.addColorStop(0,'#FFB300'); ri.addColorStop(0.6,'#FF8F00'); ri.addColorStop(1,'#E65100');
  ctx.fillStyle = ri;
  ctx.beginPath(); ctx.ellipse(10,-3,6.5,7.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0010'; ctx.beginPath(); ctx.ellipse(10,-3,4,5.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(12.5,-7,2.4,2.4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-1.5,1.2,1.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0010'; ctx.beginPath(); ctx.ellipse(10,-12.8,8.5,2.2,0,0,Math.PI*2); ctx.fill();

  // NARIZ
  ctx.fillStyle = '#881100';
  ctx.beginPath(); ctx.ellipse(0,5,3.5,2.2,0,0,Math.PI*2); ctx.fill();

  // SORRISO
  ctx.strokeStyle = '#881100'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-11,11); ctx.quadraticCurveTo(0,23,11,11); ctx.stroke();
  const tg = ctx.createLinearGradient(0,11,0,18);
  tg.addColorStop(0,'#ffffff'); tg.addColorStop(1,'#ffeedd');
  ctx.fillStyle = tg;
  ctx.fillRect(-9,11,5,7); ctx.fillRect(-3,11,5,7); ctx.fillRect(4,11,4,6);
  ctx.strokeStyle = '#ddb'; ctx.lineWidth = 0.5;
  ctx.strokeRect(-9,11,5,7); ctx.strokeRect(-3,11,5,7); ctx.strokeRect(4,11,4,6);

  // BOCHECHAS
  ctx.globalAlpha = 0.22;
  const bL = ctx.createRadialGradient(-17,5,0,-17,5,9);
  bL.addColorStop(0,'#FF4500'); bL.addColorStop(1,'transparent');
  ctx.fillStyle = bL; ctx.beginPath(); ctx.ellipse(-17,5,9,6,0,0,Math.PI*2); ctx.fill();
  const bR = ctx.createRadialGradient(17,5,0,17,5,9);
  bR.addColorStop(0,'#FF4500'); bR.addColorStop(1,'transparent');
  ctx.fillStyle = bR; ctx.beginPath(); ctx.ellipse(17,5,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // COROA PRATA
  ctx.shadowColor = '#C0C0C0'; ctx.shadowBlur = 14;
  const crg = ctx.createLinearGradient(0,-R-18,0,-R);
  crg.addColorStop(0,'#E8E8E8'); crg.addColorStop(1,'#888888');
  ctx.fillStyle = crg;
  ctx.beginPath();
  ctx.moveTo(-16,-R-1); ctx.lineTo(-16,-R-13); ctx.lineTo(-9,-R-7);
  ctx.lineTo(0,-R-20); ctx.lineTo(9,-R-7); ctx.lineTo(16,-R-13);
  ctx.lineTo(16,-R-1); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#999';
  ctx.fillRect(-16,-R-4,32,5);
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#FF2255'; ctx.shadowColor='#FF2255';
  ctx.beginPath(); ctx.arc(-9,-R-9,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0052FF'; ctx.shadowColor='#0052FF';
  ctx.beginPath(); ctx.arc(0,-R-16,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#00FF88'; ctx.shadowColor='#00FF88';
  ctx.beginPath(); ctx.arc(9,-R-9,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffffaa'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.ellipse(-9.8,-R-10,1.2,1.2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-0.8,-R-17,1.4,1.4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8.2,-R-10,1.2,1.2,0,0,Math.PI*2); ctx.fill();

  // CORRENTE PRATA
  ctx.shadowColor = '#C0C0C0'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for(var ci=-3; ci<=3; ci++){
    ctx.beginPath(); ctx.arc(ci*4.2, R+2+Math.abs(ci)*0.4, 2.5, 0, Math.PI*2); ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // PENDENTE RUBI VERMELHO
  ctx.shadowColor = '#FF1122'; ctx.shadowBlur = 16;
  ctx.fillStyle = '#FF1122';
  ctx.beginPath(); ctx.moveTo(0,R+9); ctx.lineTo(6,R+15); ctx.lineTo(0,R+21); ctx.lineTo(-6,R+15); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF7788';
  ctx.beginPath(); ctx.moveTo(0,R+9); ctx.lineTo(3,R+13); ctx.lineTo(0,R+16); ctx.lineTo(-3,R+13); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffffffcc';
  ctx.beginPath(); ctx.moveTo(0,R+9); ctx.lineTo(1.5,R+11); ctx.lineTo(0,R+13); ctx.lineTo(-1.5,R+11); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ─── COLLECTIBLE COIN ────────────────────────
function drawCoin(cx, cy) {
  var r = 9;
  // Glow
  ctx.shadowColor = '#88ddff'; ctx.shadowBlur = 12;
  // Coin body gradient
  var cg = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.08, cx, cy, r);
  cg.addColorStop(0, '#d8f4ff');
  cg.addColorStop(0.45, '#88ccff');
  cg.addColorStop(1, '#3388cc');
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Crisp outline
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#2266aa'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r - 1, 0, Math.PI*2); ctx.stroke();
  // Inner dragon symbol (mini dragon head)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(0.42, 0.42);
  // Head
  ctx.fillStyle = '#0044bb';
  ctx.beginPath(); ctx.arc(1, 0, 9, 0, Math.PI*2); ctx.fill();
  // Snout
  ctx.fillStyle = '#1155cc';
  ctx.beginPath(); ctx.ellipse(8, 2, 5, 3.5, 0, 0, Math.PI*2); ctx.fill();
  // Horn left
  ctx.fillStyle = '#ffcc22';
  ctx.beginPath(); ctx.moveTo(-3,-9); ctx.lineTo(-5,-16); ctx.lineTo(0,-9); ctx.closePath(); ctx.fill();
  // Horn right
  ctx.beginPath(); ctx.moveTo(5,-9); ctx.lineTo(7,-16); ctx.lineTo(3,-9); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle = '#88ccff';
  ctx.beginPath(); ctx.arc(5, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000d33';
  ctx.beginPath(); ctx.arc(5, -3, 1.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(6.2, -4.2, 1, 0, Math.PI*2); ctx.fill();
  // Whiskers
  ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(17,-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(17,3); ctx.stroke();
  ctx.restore();
  // Spin highlight
  ctx.fillStyle = '#ffffff55';
  ctx.beginPath(); ctx.ellipse(cx - r*0.35, cy - r*0.35, r*0.28, r*0.18, -0.6, 0, Math.PI*2); ctx.fill();
}

  ctx.strokeRect(14, H/2-78, W-28, 126);

// ─── PIPE / OBSTACLE ─────────────────────────
function makePipe(x) {
  const pv  = getPhaseVisual();
  const gap = getPhase().gap;
  const jitter = (Math.random() - 0.5) * 70;
  let center   = lastGapCenter + pv.trend + jitter;
  const minC   = 110 + gap/2;
  const maxC   = H - 80 - gap/2 - 20;
  center       = Math.max(minC, Math.min(maxC, center));
  lastGapCenter = center;
  const topH   = center - gap/2;
  const botY   = center + gap/2;
  return {
    x, topH, gap, bodyW:42, wickW:5,
    topBodyH: topH * (0.45 + Math.random()*0.4),
    botBodyH: (H-80-botY) * (0.45 + Math.random()*0.4),
    isGreen: Math.random() > 0.5, botY, passed:false
  };
}

// ─── DRAW CANDLE (phases 0-1 and space) ──────
function drawCandle(p, upColor, downColor) {
  const color = p.isGreen ? upColor : downColor;
  const cx    = p.x + p.bodyW/2;
  ctx.shadowColor = color + '99'; ctx.shadowBlur = 14;
  // wick top
  ctx.fillStyle = '#888';
  ctx.fillRect(cx - p.wickW/2, 0, p.wickW, p.topH - p.topBodyH);
  // body top
  ctx.fillStyle = color;
  ctx.fillRect(p.x, p.topH - p.topBodyH, p.bodyW, p.topBodyH);
  ctx.strokeStyle = '#ffffff22'; ctx.lineWidth = 1;
  ctx.strokeRect(p.x, p.topH - p.topBodyH, p.bodyW, p.topBodyH);
  // flame top
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(cx, 3, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff8';
  ctx.beginPath(); ctx.arc(cx, 2, 1.5, 0, Math.PI*2); ctx.fill();
  // body bottom
  ctx.fillStyle = color;
  ctx.fillRect(p.x, p.botY, p.bodyW, p.botBodyH);
  ctx.strokeRect(p.x, p.botY, p.bodyW, p.botBodyH);
  // wick bottom
  ctx.fillStyle = '#888';
  ctx.fillRect(cx - p.wickW/2, p.botY+p.botBodyH, p.wickW, H-80-p.botY-p.botBodyH);
  // flame bottom
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(cx, H-82, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff8';
  ctx.beginPath(); ctx.arc(cx, H-83, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ─── DRAW SWORD & SPEAR OBSTACLE (phase 3) — medieval weapons, tip at gap ──
function drawSkeletonArmObstacle(p) {
  var cx = p.x + p.bodyW / 2;
  function drawWeapon(y1, y2, dir) {
    var h = y2 - y1;
    if (h < 20) return;
    var tipY  = dir < 0 ? y2 : y1;
    var wallY = dir < 0 ? y1 : y2;

    if (false) { // sword branch disabled — spears only
      // ══ SWORD ══
      var guardDist = Math.min(h * 0.22, 52);
      var guardY    = tipY + dir * guardDist;  // dir moves toward wall

      // Blade — tapers to a point at tipY, wide at guardY
      var bladeG = ctx.createLinearGradient(cx - 7, 0, cx + 7, 0);
      bladeG.addColorStop(0, '#6a7ea0');
      bladeG.addColorStop(0.3, '#d8e8ff');
      bladeG.addColorStop(0.55, '#ffffff');
      bladeG.addColorStop(1, '#506080');
      ctx.fillStyle = bladeG;
      ctx.beginPath();
      ctx.moveTo(cx, tipY);
      ctx.lineTo(cx - 6.5, guardY);
      ctx.lineTo(cx + 6.5, guardY);
      ctx.closePath(); ctx.fill();
      // Fuller groove
      ctx.strokeStyle = '#a0b8d0aa'; ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(cx, tipY + dir * (-3)); ctx.lineTo(cx, guardY); ctx.stroke();
      // Edge gleam
      ctx.strokeStyle = '#eef6ff77'; ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.moveTo(cx + 2, tipY); ctx.lineTo(cx + 5.5, guardY); ctx.stroke();
      // Blade outline
      ctx.strokeStyle = '#3a4a6088'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(cx, tipY); ctx.lineTo(cx - 6.5, guardY);
      ctx.moveTo(cx, tipY); ctx.lineTo(cx + 6.5, guardY);
      ctx.stroke();

      // Cross-guard
      var gW = 21, gH = 6;
      var gg = ctx.createLinearGradient(cx - gW, guardY, cx + gW, guardY);
      gg.addColorStop(0, '#7a5a18'); gg.addColorStop(0.5, '#f2c03a'); gg.addColorStop(1, '#7a5a18');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.ellipse(cx, guardY, gW, gH/2 + 1, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#5a3e0e'; ctx.lineWidth = 1; ctx.stroke();
      ctx.shadowColor = '#f4c840'; ctx.shadowBlur = 6;
      ctx.fillStyle = '#f4c840';
      ctx.beginPath(); ctx.arc(cx - gW, guardY, 5.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + gW, guardY, 5.5, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;

      // Grip — wrapped leather
      var gripLen = Math.min(h * 0.30, 72);
      var gripEnd = guardY + dir * gripLen;
      var nStrip = 7;
      for (var gi = 0; gi < nStrip; gi++) {
        var s1 = guardY + dir * gi * (gripLen / nStrip);
        var s2 = guardY + dir * (gi + 1) * (gripLen / nStrip);
        ctx.fillStyle = gi % 2 === 0 ? '#2a1004' : '#5c2a0e';
        ctx.fillRect(cx - 4, Math.min(s1, s2), 8, Math.abs(s2 - s1) + 0.5);
      }
      ctx.strokeStyle = '#111'; ctx.lineWidth = 0.8;
      ctx.strokeRect(cx - 4, Math.min(guardY, gripEnd), 8, Math.abs(gripEnd - guardY));
      // Grip wrapping diagonal lines
      ctx.strokeStyle = '#88440022'; ctx.lineWidth = 1;
      for (var wr = 0; wr < 5; wr++) {
        var wy = guardY + dir * wr * (gripLen / 5);
        ctx.beginPath(); ctx.moveTo(cx - 4, wy); ctx.lineTo(cx + 4, wy + dir * (gripLen / 5)); ctx.stroke();
      }

      // Pommel
      ctx.shadowColor = '#f0c040'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#b88010';
      ctx.beginPath(); ctx.arc(cx, gripEnd, 9, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f4d050';
      ctx.beginPath(); ctx.arc(cx - 2.5, gripEnd + dir * (-2), 4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;

    } else {
      // ══ SPEAR / LANCE ══
      var headLen = Math.min(h * 0.30, 60);
      var headBaseY = tipY + dir * headLen;
      var headW = 10;

      // Leaf-shaped spearhead
      var shG = ctx.createLinearGradient(cx - headW, 0, cx + headW, 0);
      shG.addColorStop(0, '#5566aa');
      shG.addColorStop(0.35, '#cce0ff');
      shG.addColorStop(0.55, '#ffffff');
      shG.addColorStop(1, '#3a4466');
      ctx.fillStyle = shG;
      ctx.beginPath();
      ctx.moveTo(cx, tipY);
      ctx.quadraticCurveTo(cx - headW - 3, tipY + dir * headLen * 0.52, cx - headW * 0.4, headBaseY);
      ctx.lineTo(cx, headBaseY + dir * (-5));
      ctx.lineTo(cx + headW * 0.4, headBaseY);
      ctx.quadraticCurveTo(cx + headW + 3, tipY + dir * headLen * 0.52, cx, tipY);
      ctx.fill();
      // Spine line
      ctx.strokeStyle = '#b0ccee99'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(cx, tipY + dir * (-1)); ctx.lineTo(cx, headBaseY); ctx.stroke();
      // Edge gleam
      ctx.strokeStyle = '#ddeeff88'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx + 2, tipY);
      ctx.quadraticCurveTo(cx + headW + 1, tipY + dir * headLen * 0.5, cx + headW * 0.3, headBaseY);
      ctx.stroke();

      // Socket ring where head meets shaft
      var sockLen = 9;
      ctx.fillStyle = '#445566';
      ctx.fillRect(cx - 5, Math.min(headBaseY, headBaseY + dir * sockLen), 10, sockLen);
      ctx.strokeStyle = '#6688aa'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx - 5.5, headBaseY); ctx.lineTo(cx + 5.5, headBaseY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx - 5.5, headBaseY + dir * sockLen); ctx.lineTo(cx + 5.5, headBaseY + dir * sockLen); ctx.stroke();

      // Wooden shaft
      var shaftStart = headBaseY + dir * sockLen;
      var shaftLen2  = Math.min(h * 0.56, h - headLen - sockLen - 14);
      var shaftEnd   = shaftStart + dir * shaftLen2;
      var woodG = ctx.createLinearGradient(cx - 4, 0, cx + 4, 0);
      woodG.addColorStop(0, '#3c1a06'); woodG.addColorStop(0.45, '#9c6030');
      woodG.addColorStop(0.55, '#c07840'); woodG.addColorStop(1, '#4a2008');
      ctx.fillStyle = woodG;
      ctx.fillRect(cx - 3.5, Math.min(shaftStart, shaftEnd), 7, Math.abs(shaftEnd - shaftStart));
      // Wood grain
      ctx.strokeStyle = '#2a100433'; ctx.lineWidth = 0.8;
      for (var wi = -2; wi <= 2; wi += 2) {
        ctx.beginPath();
        ctx.moveTo(cx + wi, shaftStart); ctx.lineTo(cx + wi, shaftEnd); ctx.stroke();
      }

      // Butt spike (metal, points toward wall)
      var butTipY = shaftEnd + dir * 9;
      ctx.shadowColor = '#aabbdd'; ctx.shadowBlur = 5;
      ctx.fillStyle = '#8899bb';
      ctx.beginPath();
      ctx.moveTo(cx, butTipY);
      ctx.lineTo(cx - 3.5, shaftEnd);
      ctx.lineTo(cx + 3.5, shaftEnd);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ccddeebb';
      ctx.beginPath(); ctx.moveTo(cx + 1, butTipY + dir * (-2)); ctx.lineTo(cx + 3, shaftEnd); ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  drawWeapon(0, p.topH, -1);
  drawWeapon(p.botY, H-80, 1);
}

// ─── DRAW WORM OBSTACLE (phase 2) — giant worm with teeth at gap tip ──
function drawWormObstacle(p) {
  var cx = p.x + p.bodyW / 2;

  function drawWorm(y1, y2, dir) {
    var h = y2 - y1;
    if (h < 20) return;
    var headY = dir < 0 ? y2 : y1;   // gap edge
    var wallY = dir < 0 ? y1 : y2;   // wall side

    var segR = Math.min(p.bodyW / 2 * 0.88, 19);
    var nSegs = Math.max(3, Math.floor(h / (segR * 1.55)));

    // Segments: wall→head (head renders on top)
    for (var si = nSegs; si >= 0; si--) {
      var t = si / nSegs;                           // 0=wall, 1=head
      var segY = wallY + (headY - wallY) * t;
      var r = segR * (0.48 + t * 0.52);
      var wobble = Math.sin(frame * 0.07 + si * 0.95) * (4 * (1 - t));
      var sg = ctx.createRadialGradient(
        cx + wobble - r*0.3, segY - dir*r*0.25, r*0.08,
        cx + wobble, segY, r);
      sg.addColorStop(0, '#c8a060');
      sg.addColorStop(0.45, '#8a4e20');
      sg.addColorStop(1, '#3e1a06');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(cx + wobble, segY, r, 0, Math.PI*2); ctx.fill();
      // Segment ring line
      ctx.strokeStyle = '#3e1a0666'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx + wobble, segY, r, 0, Math.PI*2); ctx.stroke();
      // Segment divider groove
      if (si < nSegs) {
        var midY = wallY + (headY - wallY) * ((si + 0.5) / nSegs);
        ctx.strokeStyle = '#2a0e0444'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx + wobble, midY, r * 0.88, 0, Math.PI*2); ctx.stroke();
      }
    }

    // ── HEAD ──
    var hR = segR * 1.18;
    var hg = ctx.createRadialGradient(cx - hR*0.28, headY + dir*hR*0.28, hR*0.1, cx, headY, hR*1.15);
    hg.addColorStop(0, '#e0b070');
    hg.addColorStop(0.4, '#a05a28');
    hg.addColorStop(1, '#2e0e02');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(cx, headY, hR, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1a0800'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, headY, hR, 0, Math.PI*2); ctx.stroke();

    // Eyes — on wall side of head
    var eyeRow = headY + dir * hR * 0.28;
    var eyeOff = hR * 0.40;
    ctx.fillStyle = '#080400';
    ctx.beginPath(); ctx.arc(cx - eyeOff, eyeRow, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeOff, eyeRow, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffee00cc';
    ctx.beginPath(); ctx.arc(cx - eyeOff + 1.2, eyeRow - 1, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeOff + 1.2, eyeRow - 1, 1.8, 0, Math.PI*2); ctx.fill();
    // Shine dot
    ctx.fillStyle = '#ffffff88';
    ctx.beginPath(); ctx.arc(cx - eyeOff - 1.5, eyeRow - 1.8, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + eyeOff - 1.5, eyeRow - 1.8, 1.2, 0, Math.PI*2); ctx.fill();

    // ── MOUTH — opens toward gap ──
    var mouthCY = headY - dir * hR * 0.40; // gap-side of head
    var mW = hR * 0.84;
    var mH = hR * 0.52;
    // Dark cavity
    ctx.fillStyle = '#0d0000';
    ctx.beginPath(); ctx.ellipse(cx, mouthCY, mW, mH, 0, 0, Math.PI*2); ctx.fill();
    // Gum ridge
    ctx.strokeStyle = '#662222'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(cx, mouthCY, mW, mH, 0, 0, Math.PI*2); ctx.stroke();

    // Lower teeth (pointing into gap)
    var toothDir = -dir;
    var nTeeth = 7;
    ctx.shadowColor = '#fffde888'; ctx.shadowBlur = 4;
    ctx.fillStyle = '#fffff0';
    for (var ti = 0; ti < nTeeth; ti++) {
      var tx = cx - mW + (ti + 0.5) * (mW * 2 / nTeeth);
      var tLen = (ti % 2 === 0) ? mH * 0.88 : mH * 0.58;
      ctx.beginPath();
      ctx.moveTo(tx - 3.8, mouthCY);
      ctx.lineTo(tx, mouthCY + toothDir * tLen);
      ctx.lineTo(tx + 3.8, mouthCY);
      ctx.closePath(); ctx.fill();
    }
    // Upper teeth (shorter, opposite side)
    ctx.fillStyle = '#eeeedd';
    for (var ti2 = 0; ti2 < nTeeth - 1; ti2++) {
      var tx2 = cx - mW + (ti2 + 1) * (mW * 2 / nTeeth);
      ctx.beginPath();
      ctx.moveTo(tx2 - 2.8, mouthCY);
      ctx.lineTo(tx2, mouthCY - toothDir * mH * 0.42);
      ctx.lineTo(tx2 + 2.8, mouthCY);
      ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur = 0;
    // Tongue hint
    ctx.fillStyle = '#cc2233aa';
    ctx.beginPath(); ctx.ellipse(cx, mouthCY + toothDir * mH * 0.3, mW * 0.42, mH * 0.28, 0, 0, Math.PI*2);
    ctx.fill();
  }

  drawWorm(0, p.topH, -1);
  drawWorm(p.botY, H-80, 1);
}

// ─── (old drawMountainObstacle removed — replaced by drawWormObstacle) ──
function drawMountainObstacle(p) {
  var c1 = '#2d4a6e', c2 = '#3d608a', c3 = '#4a6fa5', snow = '#f0f8ff', snowS = '#c8dff0';
  var cx = p.x + p.bodyW/2;
  // Visual width extends well beyond collision box for naturalism
  var vw = 180;
  var L = cx - vw/2, R = cx + vw/2;

  // ── TOP obstacle — mountain peak hangs down from ceiling ──
  // Invisible solid fill for collision (drawn first, below everything)
  ctx.fillStyle = c1;
  ctx.fillRect(p.x, 0, p.bodyW, p.topH);

  // Wide mountain body: full-width base at ceiling, narrow peak at topH
  ctx.fillStyle = c1;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(W, 0);
  ctx.lineTo(W, p.topH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.topH * 0.72);
  ctx.lineTo(cx + 22, p.topH);
  ctx.lineTo(cx, p.topH);          // peak tip
  ctx.lineTo(cx - 22, p.topH);
  ctx.lineTo(cx - vw*0.42, p.topH * 0.72);
  ctx.lineTo(0, p.topH * 0.4);
  ctx.closePath(); ctx.fill();

  // Lighter face (right-lit)
  ctx.fillStyle = c3;
  ctx.beginPath();
  ctx.moveTo(cx, 0); ctx.lineTo(W, 0); ctx.lineTo(W, p.topH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.topH * 0.72);
  ctx.lineTo(cx + 22, p.topH); ctx.lineTo(cx, p.topH);
  ctx.closePath(); ctx.fill();

  // Mid tone band
  ctx.fillStyle = c2;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.18, 0); ctx.lineTo(cx + vw*0.18, 0);
  ctx.lineTo(cx + 22, p.topH); ctx.lineTo(cx, p.topH); ctx.lineTo(cx - 22, p.topH);
  ctx.closePath(); ctx.fill();

  // Snow cap on peak
  ctx.fillStyle = snow;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.12, p.topH * 0.42);
  ctx.lineTo(cx - 22, p.topH);
  ctx.lineTo(cx, p.topH);
  ctx.lineTo(cx + 22, p.topH);
  ctx.lineTo(cx + vw*0.12, p.topH * 0.42);
  ctx.quadraticCurveTo(cx, p.topH * 0.35, cx - vw*0.12, p.topH * 0.42);
  ctx.fill();
  ctx.fillStyle = snowS;
  ctx.beginPath();
  ctx.moveTo(cx - 10, p.topH * 0.68);
  ctx.lineTo(cx, p.topH); ctx.lineTo(cx + 10, p.topH * 0.68);
  ctx.quadraticCurveTo(cx, p.topH * 0.62, cx - 10, p.topH * 0.68);
  ctx.fill();

  // ── BOTTOM obstacle — mountain peak rises from ground ──
  var bH = H - 80 - p.botY;
  ctx.fillStyle = c1;
  ctx.fillRect(p.x, p.botY, p.bodyW, bH);

  ctx.fillStyle = c1;
  ctx.beginPath();
  ctx.moveTo(0, H-80); ctx.lineTo(W, H-80);
  ctx.lineTo(W, p.botY + bH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.botY + bH * 0.28);
  ctx.lineTo(cx + 22, p.botY);
  ctx.lineTo(cx, p.botY);
  ctx.lineTo(cx - 22, p.botY);
  ctx.lineTo(cx - vw*0.42, p.botY + bH * 0.28);
  ctx.lineTo(0, p.botY + bH * 0.4);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = c3;
  ctx.beginPath();
  ctx.moveTo(cx, H-80); ctx.lineTo(W, H-80);
  ctx.lineTo(W, p.botY + bH * 0.4);
  ctx.lineTo(cx + vw*0.42, p.botY + bH * 0.28);
  ctx.lineTo(cx + 22, p.botY); ctx.lineTo(cx, p.botY);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = c2;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.18, H-80); ctx.lineTo(cx + vw*0.18, H-80);
  ctx.lineTo(cx + 22, p.botY); ctx.lineTo(cx, p.botY); ctx.lineTo(cx - 22, p.botY);
  ctx.closePath(); ctx.fill();

  // Snow cap on bottom peak
  ctx.fillStyle = snow;
  ctx.beginPath();
  ctx.moveTo(cx - vw*0.12, p.botY + bH * 0.42);
  ctx.lineTo(cx - 22, p.botY); ctx.lineTo(cx, p.botY); ctx.lineTo(cx + 22, p.botY);
  ctx.lineTo(cx + vw*0.12, p.botY + bH * 0.42);
  ctx.quadraticCurveTo(cx, p.botY + bH * 0.48, cx - vw*0.12, p.botY + bH * 0.42);
  ctx.fill();
  ctx.fillStyle = snowS;
  ctx.beginPath();
  ctx.moveTo(cx - 10, p.botY + bH * 0.25);
  ctx.lineTo(cx, p.botY); ctx.lineTo(cx + 10, p.botY + bH * 0.25);
  ctx.quadraticCurveTo(cx, p.botY + bH * 0.3, cx - 10, p.botY + bH * 0.25);
  ctx.fill();
}

// ─── AoT UGLY GIANTS BACKGROUND (phase 4) ─────
function drawTitanFaceBg() {
  // Draw 2 giant AoT-style ugly titan faces visible at sides/bottom
  function drawGiant(fcx, fcy, scale) {
    var fR = 140 * scale;
    // Flesh — exposed muscle, dark red/pink (AoT titans have no skin)
    var hg = ctx.createRadialGradient(fcx - fR*0.3, fcy - fR*0.4, fR*0.1, fcx, fcy, fR);
    hg.addColorStop(0, '#d06050cc'); hg.addColorStop(0.5, '#8a2828aa'); hg.addColorStop(1, '#2a080888');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(fcx, fcy, fR, 0, Math.PI*2); ctx.fill();

    // Heavy brow ridge
    ctx.fillStyle = '#3a180888';
    ctx.beginPath(); ctx.ellipse(fcx, fcy - fR*0.55, fR*0.7, fR*0.18, 0, 0, Math.PI*2); ctx.fill();

    // ── BULGING EYES — wide open, staring ──
    function titanEye(ex, ey, r) {
      // Huge dark socket
      ctx.fillStyle = '#150500ee';
      ctx.beginPath(); ctx.ellipse(ex, ey, r*1.6, r*1.1, 0, 0, Math.PI*2); ctx.fill();
      // Huge white sclera — bulging out
      ctx.fillStyle = '#eeeedddd';
      ctx.beginPath(); ctx.ellipse(ex, ey, r*1.2, r*0.9, 0, 0, Math.PI*2); ctx.fill();
      // Tiny off-center iris for crazy look
      var iris_ox = (Math.sin(frame*0.012 + ex) * r * 0.2)|0;
      ctx.fillStyle = '#cc2200ee';
      ctx.beginPath(); ctx.ellipse(ex + iris_ox, ey, r*0.55, r*0.55, 0, 0, Math.PI*2); ctx.fill();
      // Black slit pupil
      ctx.fillStyle = '#000000ff';
      ctx.beginPath(); ctx.ellipse(ex + iris_ox, ey, r*0.2, r*0.4, 0, 0, Math.PI*2); ctx.fill();
      // Bloodshot veins
      ctx.strokeStyle = '#ff220033'; ctx.lineWidth = 1;
      for(var v = 0; v < 5; v++) {
        var va = v * Math.PI*2/5 + 0.4;
        ctx.beginPath();
        ctx.moveTo(ex + Math.cos(va)*r*0.7, ey + Math.sin(va)*r*0.5);
        ctx.quadraticCurveTo(ex + Math.cos(va+0.5)*r*1.0, ey + Math.sin(va+0.3)*r*0.7,
                             ex + Math.cos(va)*r*1.1, ey + Math.sin(va)*r*0.8);
        ctx.stroke();
      }
      // Glowing red eye light
      ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 20;
      ctx.strokeStyle = '#ff330066'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(ex, ey, r*1.3, r*0.95, 0, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    titanEye(fcx - fR*0.38, fcy - fR*0.38, fR*0.22);
    titanEye(fcx + fR*0.38, fcy - fR*0.38, fR*0.22);

    // Huge gaping mouth with teeth
    ctx.fillStyle = '#110000ee';
    ctx.beginPath();
    ctx.ellipse(fcx, fcy + fR*0.22, fR*0.5, fR*0.28, 0, 0, Math.PI*2);
    ctx.fill();
    // Teeth — irregular, large
    ctx.fillStyle = '#ddd8c0dd';
    var teethY = fcy + fR*0.07;
    for(var ti = -3; ti <= 3; ti++) {
      var tw = fR * 0.1 - Math.abs(ti)*fR*0.01;
      ctx.beginPath();
      ctx.moveTo(fcx + ti*fR*0.14 - tw/2, teethY);
      ctx.lineTo(fcx + ti*fR*0.14 + tw/2, teethY);
      ctx.lineTo(fcx + ti*fR*0.14 + tw/3, teethY + fR*0.2);
      ctx.lineTo(fcx + ti*fR*0.14 - tw/3, teethY + fR*0.2);
      ctx.closePath(); ctx.fill();
    }
    // Steam wisps rising from head
    ctx.strokeStyle = '#ff441806'; ctx.lineWidth = 2;
    for(var sw = -2; sw <= 2; sw++) {
      var steamX = fcx + sw * fR*0.28;
      var steamY = fcy - fR + (frame * 1.2 + sw*30) % 60;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(steamX, steamY);
      ctx.quadraticCurveTo(steamX + 8*Math.sin(frame*0.03+sw), steamY - 30, steamX + 4, steamY - 70);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Left giant — partial face visible at left edge
  drawGiant(W*0.18, H*0.72, 1.0);
  // Right giant — partial face at right edge
  drawGiant(W*0.82, H*0.68, 0.85);
  // Far background giant (center, smaller, barely visible)
  ctx.globalAlpha = 0.35;
  drawGiant(W*0.5, H*1.1, 1.3);
  ctx.globalAlpha = 1;

  // Divine golden rays still visible through the horror
  drawHeavenRays();
}

// ─── DRAW ELECTRIFIED CHAIN OBSTACLE (phase 4) ──
function drawTitanHand(p) {
  var cx = p.x + p.bodyW/2;
  var cSteel = '#446688', cDark = '#223344', cLight = '#88bbdd', cRust = '#334455';
  var eColor1 = '#00ccff', eColor2 = '#ffffff', eColor3 = '#88eeff';
  var pulse = 0.5 + 0.5 * Math.sin(frame * 0.22);

  function drawChain(y1, y2) {
    var linkH = 20, linkW = p.bodyW - 4;
    var nLinks = Math.ceil((y2-y1) / linkH);
    for(var li = 0; li < nLinks; li++) {
      var ly = y1 + li * linkH;
      var isHoriz = li % 2 === 0;
      // Link body
      var lg = ctx.createLinearGradient(p.x, 0, p.x + p.bodyW, 0);
      lg.addColorStop(0, cDark); lg.addColorStop(0.4, cLight); lg.addColorStop(0.7, cSteel); lg.addColorStop(1, cDark);
      ctx.fillStyle = lg;
      if(isHoriz) {
        // Horizontal link — wider, flatter
        ctx.fillRect(p.x + 2, ly, linkW, Math.min(linkH - 2, y2 - ly));
        ctx.strokeStyle = cDark; ctx.lineWidth = 1;
        ctx.strokeRect(p.x + 2, ly, linkW, Math.min(linkH - 2, y2 - ly));
        // Center hole
        ctx.fillStyle = cDark;
        ctx.fillRect(cx - 6, ly + 3, 12, Math.min(linkH - 8, y2 - ly - 4));
      } else {
        // Vertical link — narrower, taller
        ctx.fillRect(p.x + 6, ly, linkW - 8, Math.min(linkH - 2, y2 - ly));
        ctx.strokeStyle = cDark; ctx.lineWidth = 1;
        ctx.strokeRect(p.x + 6, ly, linkW - 8, Math.min(linkH - 2, y2 - ly));
        ctx.fillStyle = cDark;
        ctx.fillRect(cx - 4, ly + 3, 8, Math.min(linkH - 8, y2 - ly - 4));
      }
      // Rust spots
      ctx.fillStyle = cRust + '44';
      ctx.fillRect(p.x + 4, ly + 2, 5, 4);
    }

    // Electric sparks along chain
    ctx.shadowColor = eColor1; ctx.shadowBlur = 16 * pulse;
    ctx.strokeStyle = eColor1; ctx.lineWidth = 1.5;
    for(var es = 0; es < 4; es++) {
      var esy = y1 + ((frame*3 + es*40) % (y2-y1));
      var esx = p.x + 6 + (es%2)*12;
      ctx.beginPath();
      ctx.moveTo(esx, esy);
      ctx.lineTo(esx + 10*Math.sin(frame*0.3+es), esy + 8);
      ctx.lineTo(esx - 5, esy + 14);
      ctx.lineTo(esx + 8, esy + 20);
      ctx.stroke();
    }
    // Central lightning core
    ctx.strokeStyle = eColor2; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, y1);
    for(var ls = 1; ls < 8; ls++) {
      var lsy = y1 + (y2-y1)*ls/8;
      var lsx = cx + (ls%2===0 ? 1:-1) * (4 + 3*Math.sin(frame*0.4+ls));
      ctx.lineTo(lsx, lsy);
    }
    ctx.lineTo(cx, y2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Outer glow
    ctx.shadowColor = eColor1; ctx.shadowBlur = 8 * pulse;
    ctx.strokeStyle = eColor3 + '88'; ctx.lineWidth = p.bodyW;
    ctx.globalAlpha = 0.06 * pulse;
    ctx.beginPath(); ctx.moveTo(cx, y1); ctx.lineTo(cx, y2); ctx.stroke();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  drawChain(0, p.topH);
  drawChain(p.botY, H-80);

  // Anchor bolts at gap edges
  function anchorBolt(ay) {
    ctx.fillStyle = '#aabbcc';
    ctx.beginPath(); ctx.arc(cx, ay, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = cDark;
    ctx.beginPath(); ctx.arc(cx, ay, 5, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = eColor1; ctx.shadowBlur = 14*pulse;
    ctx.fillStyle = eColor1;
    ctx.beginPath(); ctx.arc(cx, ay, 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  anchorBolt(p.topH);
  anchorBolt(p.botY);
}

// ─── DRAW BASE PIPE OBSTACLE (phase 1) — blue Mario pipes + BASE vertical ──
function drawBasePipeObstacle(p) {
  var pB = '#2288ff', pD = '#0044cc', pL = '#66aaff', pHL = '#ffffff44', pOut = '#002299';
  var cx = p.x + p.bodyW/2;
  var rimH = 16, rimExt = 7;

  function pipeGrad(x, w) {
    var g = ctx.createLinearGradient(x, 0, x+w, 0);
    g.addColorStop(0, pD); g.addColorStop(0.3, pL); g.addColorStop(0.65, pB); g.addColorStop(1, pD);
    return g;
  }

  function drawPipe(bodyY1, bodyY2, rimY, rimDir) {
    // Body
    ctx.fillStyle = pipeGrad(p.x, p.bodyW);
    ctx.fillRect(p.x, bodyY1, p.bodyW, bodyY2 - bodyY1);
    // Rim
    ctx.fillStyle = pipeGrad(p.x - rimExt, p.bodyW + rimExt*2);
    ctx.fillRect(p.x - rimExt, rimY, p.bodyW + rimExt*2, rimH);
    // Outlines
    ctx.strokeStyle = pOut; ctx.lineWidth = 1.5;
    ctx.strokeRect(p.x, bodyY1, p.bodyW, bodyY2 - bodyY1);
    ctx.strokeRect(p.x - rimExt, rimY, p.bodyW + rimExt*2, rimH);
    // Shine strip
    ctx.fillStyle = pHL; ctx.fillRect(p.x + 5, bodyY1 + 4, 7, bodyY2 - bodyY1 - 10);
    // BASE text — vertical, neon white
    var textH = bodyY2 - bodyY1;
    if(textH > 50) {
      ctx.save();
      ctx.translate(cx, bodyY1 + textH/2);
      ctx.rotate(-Math.PI/2);
      ctx.shadowColor = '#aaddff'; ctx.shadowBlur = 8;
      ctx.fillStyle = '#eef6ff'; ctx.font = 'bold 11px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('BASE', 0, 4);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  drawPipe(0, p.topH - rimH, p.topH - rimH, -1);
  drawPipe(p.botY + rimH, H-80, p.botY, 1);
}

// ─── DRAW CASTLE OBSTACLE (phase 5) — stone walls + spike battlements ──
function drawCastleObstacle(p) {
  var stD = '#1e1628', stM = '#2e2040', stL = '#403058', mortar = '#120e1c';
  var spkC = '#707090', spkD = '#303040', spkH = '#aaaacc88';
  var bw = p.bodyW;

  function drawBricks(x, y, w, h) {
    ctx.fillStyle = stM;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = mortar; ctx.lineWidth = 0.8;
    var bH = 10;
    for(var r = 0; r * bH < h; r++) {
      var rowY = y + r * bH;
      var offX = r % 2 === 0 ? 0 : 9;
      ctx.beginPath(); ctx.moveTo(x, rowY); ctx.lineTo(x+w, rowY); ctx.stroke();
      for(var bx4 = x + offX; bx4 < x + w; bx4 += 18) {
        ctx.beginPath(); ctx.moveTo(bx4, rowY); ctx.lineTo(bx4, Math.min(rowY+bH, y+h)); ctx.stroke();
      }
    }
    // Side shadow edges
    ctx.fillStyle = stD + 'cc';
    ctx.fillRect(x, y, 3, h);
    ctx.fillRect(x+w-3, y, 3, h);
  }

  function drawSpikeBattlement(x, gapEdgeY, dir) {
    // dir: -1 top obstacle (down), 1 bottom obstacle (up)
    // Merlons (teeth)
    var mW = 9, gap3 = 5, mH = 13;
    for(var mi = 0; mi < 3; mi++) {
      var mx = x + 2 + mi * (mW + gap3);
      ctx.fillStyle = stL;
      ctx.fillRect(mx, gapEdgeY, mW, dir * mH);
      ctx.strokeStyle = mortar; ctx.lineWidth = 0.8;
      ctx.strokeRect(mx, gapEdgeY, mW, dir * mH);
    }
    // Metal spikes pointing into gap
    for(var si = 0; si < 4; si++) {
      var sx = x + 3 + si * (bw / 4);
      var sLen = 20 + (si % 2) * 7;
      ctx.fillStyle = spkC;
      ctx.beginPath();
      ctx.moveTo(sx - 3, gapEdgeY);
      ctx.lineTo(sx, gapEdgeY + dir * sLen);
      ctx.lineTo(sx + 3, gapEdgeY);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = spkD; ctx.lineWidth = 0.8; ctx.stroke();
      ctx.fillStyle = spkH;
      ctx.beginPath();
      ctx.moveTo(sx - 1, gapEdgeY);
      ctx.lineTo(sx, gapEdgeY + dir * sLen * 0.55);
      ctx.lineTo(sx + 1, gapEdgeY);
      ctx.closePath(); ctx.fill();
    }
  }

  function drawPillarChains(y1, y2) {
    var linkH = 10, lRx = 6.5, lRy = 3.2;
    ctx.lineWidth = 2.2;
    ctx.shadowColor = '#aa66cc'; ctx.shadowBlur = 5;
    // Run two chain strips down left and right edges
    var sides = [p.x + 6, p.x + bw - 6];
    for (var si2 = 0; si2 < 2; si2++) {
      var lcx = sides[si2];
      var nLinks = Math.floor((y2 - y1) / linkH);
      for (var li = 0; li < nLinks; li++) {
        var lcy = y1 + li * linkH + linkH / 2;
        var horiz = li % 2 === 0;
        // Darker fill so links look solid
        ctx.fillStyle = horiz ? '#3a2a4a' : '#2c1e3a';
        ctx.strokeStyle = horiz ? '#7755aa' : '#554488';
        ctx.beginPath();
        ctx.ellipse(lcx, lcy, horiz ? lRx : lRy, horiz ? lRy : lRx, 0, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Highlight on top of each link
        ctx.fillStyle = '#aa88cc44';
        ctx.beginPath();
        ctx.ellipse(lcx - (horiz ? 1.5 : 0.5), lcy - 1, horiz ? lRx*0.55 : lRy*0.55, horiz ? lRy*0.5 : lRx*0.5, 0, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  // TOP obstacle
  drawBricks(p.x, 0, bw, p.topH);
  drawPillarChains(2, p.topH - 14);
  drawSpikeBattlement(p.x, p.topH, -1);
  ctx.shadowColor = '#9966cc'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#9966cc88'; ctx.lineWidth = 1.5;
  ctx.strokeRect(p.x, 0, bw, p.topH);
  ctx.shadowBlur = 0;

  // BOTTOM obstacle
  drawBricks(p.x, p.botY, bw, H-80-p.botY);
  drawPillarChains(p.botY + 14, H-80-2);
  drawSpikeBattlement(p.x, p.botY, 1);
  ctx.shadowColor = '#9966cc'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#9966cc88'; ctx.lineWidth = 1.5;
  ctx.strokeRect(p.x, p.botY, bw, H-80-p.botY);
  ctx.shadowBlur = 0;
}

// ─── DRAW LASER OBSTACLE (phase 6) — energy beam ──
function drawLaserObstacle(p) {
  var pv = getPhaseVisual();
  var lc = pv.candleUp;
  var cx = p.x + p.bodyW/2;
  var pulse = 0.55 + 0.45 * Math.sin(frame * 0.13);

  function drawBeam(y1, y2) {
    var h = y2 - y1;
    // Dark energy conduit behind beam
    ctx.fillStyle = '#080814';
    ctx.fillRect(p.x, y1, p.bodyW, h);
    // Outer soft glow
    ctx.shadowColor = lc; ctx.shadowBlur = 24 * pulse;
    ctx.fillStyle = lc + '28';
    ctx.fillRect(p.x, y1, p.bodyW, h);
    // Mid glow
    ctx.fillStyle = lc + '66';
    ctx.fillRect(cx - 12, y1, 24, h);
    // Inner bright core
    ctx.fillStyle = lc + 'cc';
    ctx.fillRect(cx - 5, y1, 10, h);
    // White hot center
    ctx.fillStyle = '#ffffffcc';
    ctx.fillRect(cx - 2, y1, 4, h);
    ctx.shadowBlur = 0;
    // Moving scan line
    var scanPos = y1 + ((frame * 4 + y1) % h);
    ctx.fillStyle = '#ffffff33';
    ctx.fillRect(p.x, scanPos, p.bodyW, 2);
    // Energy emitter cap
    ctx.shadowColor = lc; ctx.shadowBlur = 30 * pulse;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(cx, y1 === 0 ? 6 : y2 - 6, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = lc;
    ctx.beginPath(); ctx.arc(cx, y1 === 0 ? 6 : y2 - 6, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  drawBeam(0, p.topH);
  drawBeam(p.botY, H-80);
}

// ─── DRAW VINE OBSTACLE (phase 7) — giant thorny vine ──
function drawVineObstacle(p) {
  var vD = '#2a1a08', vM = '#3d2a10', vG = '#1a3a0a', vThorn = '#5a3a10', vLeaf = '#2d6018';
  var cx = p.x + p.bodyW/2;

  function drawVineBody(y1, y2) {
    // Main vine body
    var vg = ctx.createLinearGradient(p.x, 0, p.x+p.bodyW, 0);
    vg.addColorStop(0, vD); vg.addColorStop(0.4, vM); vg.addColorStop(0.7, vG); vg.addColorStop(1, vD);
    ctx.fillStyle = vg;
    ctx.fillRect(p.x, y1, p.bodyW, y2 - y1);
    // Vine texture lines
    ctx.strokeStyle = vD; ctx.lineWidth = 1;
    for(var vy = y1+6; vy < y2-4; vy += 10) {
      ctx.beginPath();
      ctx.moveTo(p.x+3, vy);
      ctx.quadraticCurveTo(cx, vy + 4, p.x+p.bodyW-3, vy);
      ctx.stroke();
    }
    // Thorns on each side
    ctx.fillStyle = vThorn;
    for(var ty = y1+8; ty < y2-4; ty += 14) {
      // Left thorn
      ctx.beginPath();
      ctx.moveTo(p.x, ty); ctx.lineTo(p.x-12, ty+5); ctx.lineTo(p.x, ty+8);
      ctx.closePath(); ctx.fill();
      // Right thorn
      ctx.beginPath();
      ctx.moveTo(p.x+p.bodyW, ty+4); ctx.lineTo(p.x+p.bodyW+12, ty+8); ctx.lineTo(p.x+p.bodyW, ty+12);
      ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1;
    ctx.strokeRect(p.x, y1, p.bodyW, y2-y1);
  }

  drawVineBody(0, p.topH);
  drawVineBody(p.botY, H-80);
}

// ─── DRAW GROTESQUE OBSTACLE (phase 8) — pulsing limbo growth with tip eyes ──
function drawGrotesqueObstacle(p) {
  var cx = p.x + p.bodyW/2;
  var gEye = '#cc44ff';
  // Pulse: alternates between near-black and near-white
  var pulse = (Math.sin(frame * 0.18) + 1) / 2; // 0..1
  var bodyLight = Math.floor(pulse * 200);
  var gBodyColor = 'rgb(' + bodyLight + ',' + (bodyLight*0.6|0) + ',' + bodyLight + ')';
  var gBodyEdge  = pulse > 0.5 ? '#ffffff' : '#220033';

  function drawGrowth(y1, y2, dir) {
    var h = y2 - y1;
    // Pulsing body
    ctx.fillStyle = gBodyColor;
    ctx.fillRect(p.x, y1, p.bodyW, h);

    // Organic bumpy gap-edge silhouette
    var gapY = dir > 0 ? y1 : y2;
    ctx.fillStyle = gBodyEdge;
    ctx.beginPath();
    ctx.moveTo(p.x, gapY);
    for(var bx5 = 0; bx5 <= p.bodyW; bx5 += 5) {
      var bmp = 7 * Math.sin((bx5*0.5 + frame*0.9) * 0.8) * (-dir);
      ctx.lineTo(p.x + bx5, gapY + bmp);
    }
    ctx.lineTo(p.x + p.bodyW, gapY + dir*(-10));
    ctx.lineTo(p.x + p.bodyW, dir > 0 ? y2 : y1);
    ctx.lineTo(p.x, dir > 0 ? y2 : y1);
    ctx.closePath(); ctx.fill();

    // Glowing cracks
    ctx.shadowColor = gEye; ctx.shadowBlur = 10 * pulse;
    ctx.strokeStyle = gEye + 'aa'; ctx.lineWidth = 1.2;
    for(var cr = 0; cr < 3; cr++) {
      var crx2 = p.x + 7 + cr*(p.bodyW/3);
      var crBaseY = dir > 0 ? y1 + h*0.25 : y2 - h*0.25;
      ctx.beginPath();
      ctx.moveTo(crx2, crBaseY);
      ctx.lineTo(crx2 + 5, crBaseY + dir*h*0.2);
      ctx.lineTo(crx2 + 2, crBaseY + dir*h*0.38);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // ── FIRE on body ──
    var nFlames = 9;
    for (var fi6 = 0; fi6 < nFlames; fi6++) {
      var fx6 = p.x + (fi6 / (nFlames - 1)) * p.bodyW;
      // Flame base: 30% into body from gap side
      var fireBase = dir > 0 ? y1 + h * 0.28 : y2 - h * 0.28;
      var flameH6 = 22 + Math.sin(frame * 0.17 + fi6 * 1.4) * 11 + Math.sin(frame * 0.31 + fi6 * 0.6) * 7;
      // Flames lick toward the gap
      var fireTip = fireBase - dir * flameH6;
      var fg6 = ctx.createLinearGradient(fx6, fireBase, fx6, fireTip);
      fg6.addColorStop(0, '#ff000000');
      fg6.addColorStop(0.25, '#dd3300cc');
      fg6.addColorStop(0.6,  '#ff7700bb');
      fg6.addColorStop(0.85, '#ffcc0099');
      fg6.addColorStop(1,    '#ffff6633');
      ctx.fillStyle = fg6;
      ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 14;
      var sway = Math.sin(frame * 0.19 + fi6 * 2.1) * 5;
      ctx.beginPath();
      ctx.moveTo(fx6 - 5, fireBase);
      ctx.quadraticCurveTo(fx6 + sway - 3, (fireBase + fireTip) / 2, fx6 + sway, fireTip);
      ctx.quadraticCurveTo(fx6 + sway + 3, (fireBase + fireTip) / 2, fx6 + 5, fireBase);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // ── EYES right at the gap tip ──
    var eyeY = gapY;
    ctx.shadowColor = gEye; ctx.shadowBlur = 16 * pulse;
    // Eye sockets
    ctx.fillStyle = '#000000';
    ctx.beginPath(); ctx.ellipse(cx - 11, eyeY + dir*(-5), 8, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 11, eyeY + dir*(-5), 8, 6, 0, 0, Math.PI*2); ctx.fill();
    // Glowing iris
    ctx.fillStyle = gEye;
    ctx.beginPath(); ctx.ellipse(cx - 11, eyeY + dir*(-5), 5, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 11, eyeY + dir*(-5), 5, 4, 0, 0, Math.PI*2); ctx.fill();
    // Slit pupil
    ctx.fillStyle = '#000000';
    ctx.beginPath(); ctx.ellipse(cx - 11, eyeY + dir*(-5), 1.5, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 11, eyeY + dir*(-5), 1.5, 4, 0, 0, Math.PI*2); ctx.fill();
    // White highlight
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(cx - 8, eyeY + dir*(-7), 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 14, eyeY + dir*(-7), 1.8, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  drawGrowth(0, p.topH, -1);   // top: eyes at y=topH (gap edge)
  drawGrowth(p.botY, H-80, 1); // bottom: eyes at y=botY (gap edge)
}

// ─── DRAW ROCKET OBSTACLE (phase 9) — proper rockets, nose at gap ──
function drawRocketObstacle(p) {
  var rW = '#e8f0ff', rMid = '#b0c0e0', rDark = '#6070a0';
  var rRed = '#ee2233', rFin = '#0044cc', rFire1 = '#ffdd00', rFire2 = '#ff6600';
  var cx = p.x + p.bodyW/2;

  // dir: -1 = top obstacle (nose DOWN at gap), 1 = bottom obstacle (nose UP at gap)
  function drawRocket(y1, y2, dir) {
    var h = y2 - y1;
    if(h < 24) return;
    // "gap edge" = where the nose tip points
    var gapEdge = dir < 0 ? y2 : y1;
    // "wall edge" = attached to ceiling/floor
    var wallEdge = dir < 0 ? y1 : y2;

    var noseH  = Math.min(h * 0.2, 30);
    var bodyH  = h * 0.62;
    var exhaustH = h - noseH - bodyH;
    var finH   = Math.min(exhaustH * 0.7, 22);

    // Positions (nose at gapEdge, exhaust at wallEdge)
    var noseBase = gapEdge + dir * noseH;   // where nose ends and body starts
    var bodyEnd  = noseBase + dir * bodyH;  // where body ends
    var exhaustEnd = wallEdge;              // = bodyEnd + exhaustH

    // ── Exhaust flame (drawn first, behind fins) ──
    var flicker = 0.65 + 0.35 * Math.sin(frame * 0.28);
    var fLen = exhaustH * 1.4 * flicker;
    ctx.shadowColor = rFire2; ctx.shadowBlur = 18 * flicker;
    ctx.fillStyle = rFire1;
    ctx.beginPath();
    ctx.moveTo(cx - 11, wallEdge);
    ctx.lineTo(cx, wallEdge + dir * fLen);
    ctx.lineTo(cx + 11, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = rFire2;
    ctx.beginPath();
    ctx.moveTo(cx - 7, wallEdge);
    ctx.lineTo(cx, wallEdge + dir * fLen * 0.7);
    ctx.lineTo(cx + 7, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;

    // ── Fins (attached at exhaust section) ──
    ctx.fillStyle = rFin;
    var finBase = bodyEnd; // fins go from bodyEnd toward wallEdge
    // Left fin
    ctx.beginPath();
    ctx.moveTo(p.x, finBase);
    ctx.lineTo(p.x - 14, finBase + dir * finH);
    ctx.lineTo(p.x, wallEdge);
    ctx.closePath(); ctx.fill();
    // Right fin
    ctx.beginPath();
    ctx.moveTo(p.x + p.bodyW, finBase);
    ctx.lineTo(p.x + p.bodyW + 14, finBase + dir * finH);
    ctx.lineTo(p.x + p.bodyW, wallEdge);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#002299'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(p.x, finBase); ctx.lineTo(p.x-14, finBase+dir*finH); ctx.lineTo(p.x, wallEdge); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+p.bodyW, finBase); ctx.lineTo(p.x+p.bodyW+14, finBase+dir*finH); ctx.lineTo(p.x+p.bodyW, wallEdge); ctx.stroke();

    // ── Exhaust nozzle bell ──
    var ng = ctx.createLinearGradient(p.x, 0, p.x+p.bodyW, 0);
    ng.addColorStop(0, rDark); ng.addColorStop(0.5, rMid); ng.addColorStop(1, rDark);
    ctx.fillStyle = ng;
    ctx.fillRect(p.x + 4, bodyEnd < wallEdge ? bodyEnd : wallEdge, p.bodyW - 8,
                 Math.abs(wallEdge - bodyEnd));

    // ── Body (main cylinder) ──
    var bg2 = ctx.createLinearGradient(p.x, 0, p.x + p.bodyW, 0);
    bg2.addColorStop(0, rDark); bg2.addColorStop(0.25, rW); bg2.addColorStop(0.75, rMid); bg2.addColorStop(1, rDark);
    ctx.fillStyle = bg2;
    var bodyTop = noseBase < bodyEnd ? noseBase : bodyEnd;
    ctx.fillRect(p.x, bodyTop, p.bodyW, bodyH);
    // Shine strip
    ctx.fillStyle = '#ffffff44'; ctx.fillRect(p.x + 6, bodyTop + 4, 6, bodyH - 8);

    // "BASE" text on body — vertical
    if(bodyH > 50) {
      ctx.save();
      ctx.translate(cx, bodyTop + bodyH/2);
      ctx.rotate(-Math.PI/2);
      ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 8;
      ctx.fillStyle = '#0052FF'; ctx.font = 'bold 11px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('BASE', 0, 4);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Circular porthole window
    var winCY = bodyTop + bodyH * 0.35;
    ctx.fillStyle = '#aaddff';
    ctx.beginPath(); ctx.arc(cx, winCY, 9, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = rDark; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#ffffff55';
    ctx.beginPath(); ctx.arc(cx - 3, winCY - 3, 3.5, 0, Math.PI*2); ctx.fill();

    // ── Nose cone ──
    ctx.fillStyle = rRed;
    ctx.beginPath();
    ctx.moveTo(cx, gapEdge);                          // tip at gap
    ctx.lineTo(p.x + 3, noseBase);
    ctx.lineTo(p.x + p.bodyW - 3, noseBase);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#aa0022'; ctx.lineWidth = 1; ctx.stroke();
    // Nose shine
    ctx.fillStyle = '#ffffff44';
    ctx.beginPath();
    ctx.moveTo(cx + 2, gapEdge + dir*4);
    ctx.lineTo(p.x + p.bodyW/2 + 6, noseBase);
    ctx.lineTo(cx + 2, noseBase);
    ctx.closePath(); ctx.fill();

    // Body outline
    ctx.strokeStyle = rDark; ctx.lineWidth = 1.2;
    ctx.strokeRect(p.x, bodyTop, p.bodyW, bodyH);
  }

  drawRocket(0, p.topH, -1);    // top: nose DOWN at gap
  drawRocket(p.botY, H-80, 1);  // bottom: nose UP at gap
}

// ─── drawObstacle — dispatcher ────────────────
function drawObstacle(p) {
  var pi = getPhaseIdx();
  var pv = getPhaseVisual();
  if(pi === 0) {
    drawCandle(p, pv.candleUp, pv.candleDown);
  } else if(pi === 1) {
    drawBasePipeObstacle(p);
  } else if(pi === 2) {
    drawWormObstacle(p);
  } else if(pi === 3) {
    drawSkeletonArmObstacle(p);
  } else if(pi === 4) {
    drawTitanHand(p);
  } else if(pi === 5) {
    drawCastleObstacle(p);
  } else if(pi === 6) {
    drawLaserObstacle(p);
  } else if(pi === 7) {
    drawVineObstacle(p);
  } else if(pi === 8) {
    drawGrotesqueObstacle(p);
  } else if(pi === 9) {
    drawRocketObstacle(p);
  }
}

// ─── BACKGROUND HELPERS ───────────────────────
function drawGround(pv) {
  var gnd = ctx.createLinearGradient(0, H-80, 0, H);
  gnd.addColorStop(0, pv.groundColor);
  gnd.addColorStop(1, '#00000088');
  ctx.fillStyle = gnd; ctx.fillRect(0, H-80, W, 80);
  ctx.shadowColor = pv.groundLine; ctx.shadowBlur = 6;
  ctx.fillStyle = pv.groundLine; ctx.fillRect(0, H-80, W, 2);
  ctx.shadowBlur = 0;
}

function drawTicker(pv) {
  ctx.fillStyle = '#000000dd'; ctx.fillRect(0, 0, W, 20);
  // separator line
  ctx.fillStyle = pv.glowColor + '44'; ctx.fillRect(0, 20, W, 1);
  var ph = getPhase();
  // Phase — left side
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 4;
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'left';
  ctx.fillText(ph.label, 6, 14);
  ctx.shadowBlur = 0;
  // Scene name — center
  ctx.fillStyle = pv.glowColor + 'cc'; ctx.font = '8px Courier New'; ctx.textAlign = 'center';
  ctx.fillText(pv.name, W/2, 14);
  // $BLEU tag — right
  ctx.fillStyle = pv.glowColor; ctx.font = '8px Courier New'; ctx.textAlign = 'right';
  ctx.fillText('$BLEU +6900%', W-6, 14);
}

function drawStarField(count, alpha) {
  ctx.fillStyle = '#ffffff';
  for(var i = 0; i < count; i++) {
    var sx = (i * 127 + frame * 0.2) % W;
    var sy = (i * 83) % (H-80);
    var ss = 0.5 + (i % 3) * 0.5;
    ctx.globalAlpha = alpha * (0.5 + (i%4)*0.12);
    ctx.beginPath(); ctx.arc(sx, sy, ss, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawClouds(alphaScale) {
  ctx.fillStyle = '#ffffff';
  for(var i = 0; i < 5; i++) {
    var cx = W + 80 - ((i*160 + frame*0.5) % (W+200));
    var cy = 45 + i * 58 + Math.sin(frame*0.009 + i) * 10;
    var r  = 18 + (i%3)*11;
    ctx.save();
    ctx.globalAlpha = alphaScale * (0.55 + (i%3)*0.18);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.arc(cx + r*0.9,  cy - r*0.35, r*0.65, 0, Math.PI*2);
    ctx.arc(cx + r*1.75, cy,           r*0.75, 0, Math.PI*2);
    ctx.arc(cx + r*0.8,  cy + r*0.3,  r*0.55, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSnowflakes() {
  for(var i = 0; i < 28; i++) {
    var sx = ((i*173 + frame*(0.5 + (i%5)*0.15)) % W + W) % W;
    var sy = ((i*97  + frame*(1.3 + (i%3)*0.3)) % (H-80) + H-80) % (H-80);
    var ss = 1.4 + (i%3)*0.7;
    ctx.globalAlpha = 0.25 + (i%5)*0.08;
    ctx.fillStyle = '#e8f4ff';
    ctx.beginPath(); ctx.arc(sx, sy, ss, 0, Math.PI*2); ctx.fill();

function drawAsteroids() {

    {ox:320, y:100, r:18, speed:0.06, rot:0.006},
    {ox:140, y:310, r:11, speed:0.10, rot:-0.009},
    {ox:370, y:250, r: 7, speed:0.14, rot:0.015},
    {ox:80,  y:380, r:13, speed:0.07, rot:-0.007},
  ];
  for(var ai3 = 0; ai3 < asteroids.length; ai3++) {
    var ast = asteroids[ai3];
    var ax = ((ast.ox - frame * ast.speed * 60) % (W + ast.r*3) + W + ast.r*3) % (W + ast.r*3) - ast.r*1.5;
    var ay = ast.y;
    var rotAngle = frame * ast.rot;
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(rotAngle);
    // Irregular asteroid shape via polygon
    var nPts = 8;
    ctx.beginPath();
    for(var ap = 0; ap < nPts; ap++) {
      var aang = ap * Math.PI*2/nPts;
      var ar = ast.r * (0.7 + 0.3 * Math.sin(ap * 2.3 + ai3));
      ap === 0 ? ctx.moveTo(Math.cos(aang)*ar, Math.sin(aang)*ar)
               : ctx.lineTo(Math.cos(aang)*ar, Math.sin(aang)*ar);
    }
    ctx.closePath();
    var ag = ctx.createRadialGradient(-ast.r*0.3, -ast.r*0.3, 0, 0, 0, ast.r);
    ag.addColorStop(0, '#887766'); ag.addColorStop(0.6, '#554433'); ag.addColorStop(1, '#332211');
    ctx.fillStyle = ag;
    ctx.fill();
    ctx.strokeStyle = '#998877'; ctx.lineWidth = 1; ctx.stroke();
    // Crater marks
    ctx.fillStyle = '#443322aa';
    ctx.beginPath(); ctx.arc(ast.r*0.25, -ast.r*0.2, ast.r*0.22, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-ast.r*0.3, ast.r*0.25, ast.r*0.15, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

  ctx.strokeStyle = '#0052FF11'; ctx.lineWidth = 1;
  var hx = 34, hy = 38;
  for(var gx = -hx; gx < W+hx; gx += hx*1.5) {
    for(var gy = 22; gy < H-80; gy += hy) {
      var offx = (Math.floor(gy/hy) % 2) * hx*0.75;
      var hcx = gx + offx + ((frame*0.08)%(hx*1.5));
      ctx.beginPath();
      for(var he = 0; he < 6; he++) {
        var ha = he * Math.PI/3;
        var hpx = hcx + 14*Math.cos(ha), hpy = gy + 16*Math.sin(ha);
        he===0 ? ctx.moveTo(hpx,hpy) : ctx.lineTo(hpx,hpy);
      }
      ctx.closePath(); ctx.stroke();
    }
  }
}

// ─── MAIN BACKGROUND DRAW ────────────────────
function drawBg() {
  var pv = getPhaseVisual();
  var pi = getPhaseIdx();

  // Base gradient — cached per phase
  if(_bgGradPhase!==pi){ _bgGradPhase=pi; _bgGrad=ctx.createLinearGradient(0,0,0,H); _bgGrad.addColorStop(0,pv.bg[0]); _bgGrad.addColorStop(1,pv.bg[1]); }

  // ── Phase-specific background elements ──
  if(pi === 0) {

    ctx.strokeStyle = '#00ff4109'; ctx.lineWidth = 0.5;
    for(var gxi=0; gxi<W; gxi+=36){ ctx.beginPath(); ctx.moveTo(gxi,22); ctx.lineTo(gxi,H); ctx.stroke(); }
    for(var gyi=22; gyi<H; gyi+=36){ ctx.beginPath(); ctx.moveTo(0,gyi); ctx.lineTo(W,gyi); ctx.stroke(); }
    ctx.strokeStyle = '#00ff4120'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for(var cx2=0; cx2<=W; cx2+=4) {

      var mx3 = (mi*37+3) % W;

      ctx.fillText(chars[(mi+Math.floor(frame/18+mi))%chars.length], mx3, my3);
    }

  } else if(pi === 1) {

    ctx.fillStyle = lake; ctx.fillRect(0, lakeY, W, 40);

    var fog = ctx.createLinearGradient(0, H-200, 0, H-80);
    fog.addColorStop(0,'transparent'); fog.addColorStop(1,'#b0d8f018');
    ctx.fillStyle = fog; ctx.fillRect(0, H-200, W, 120);
    drawDrizzle();

  } else if(pi === 4) {
    // PHASE 5 — HEAVEN'S GATE: titan face + divine rays + pillars
    drawTitanFaceBg();
    drawHeavenRays();
    drawHeavenPillars();
    drawClouds(0.18);
    var mist = ctx.createLinearGradient(0, H-200, 0, H-80);
    mist.addColorStop(0,'transparent'); mist.addColorStop(1,'#FFD70028');

  } else if(pi === 5) {

    drawGhostDungeonBg();

    drawLimboBg();

  }

  // Ticker top bar
  drawTicker(pv);

  drawGround(pv);

  // Phase name bottom-right
  ctx.fillStyle = pv.glowColor + '55'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right';

// ─── PARTÍCULAS ──────────────────────────────
function spawnParticles(x, y, color, n) {
  n = n || 14;
  if(particles.length > 35) return;
  for(var i=0; i<n; i++)
    particles.push({x:x, y:y, vx:(Math.random()-.5)*7, vy:(Math.random()-.5)*7, life:50, color:color});
}
function updateParticles() {
  particles = particles.filter(function(p){ return p.life>0; });
  for(var i=0; i<particles.length; i++){
    var p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

// ─── COLISÃO ─────────────────────────────────
function hitTest() {
  var r = 14;
  for(var i=0; i<pipes.length; i++){
    var p = pipes[i];
    if(bleu.x+r > p.x && bleu.x-r < p.x+p.bodyW){
      if(bleu.y-r < p.topH) return true;
      if(bleu.y+r > p.botY) return true;
    }
  }
  return bleu.y+r > H-80 || bleu.y-r < 22;
}

// ─── LOOP PRINCIPAL ──────────────────────────
var _lastT=0;
function loop(ts) {
  requestAnimationFrame(loop);
  var dt = ts - _lastT;
  if(dt < 14) return; // cap ~72fps max to save battery/CPU on 90/120Hz screens
  _lastT = ts;
  frame++;
  drawBg();
  ctx.save();
  if(screenShake>0){ctx.translate((Math.random()-.5)*screenShake*2,(Math.random()-.5)*screenShake*.7);}

  // ── DAILY MODAL ──
  if(dailyModal){ drawDailyModal(); return; }

  // ── IDLE ──
  if(gameState === 'idle'){
    drawIdleTabs();
    if(idleTab==='play'){
      drawCharacter(bleu.x, bleu.y + Math.sin(frame*.045)*8, frame*.22, 0);
      ctx.textAlign = 'center';
      ctx.font = 'bold 34px Courier New';
      var tg = ctx.createLinearGradient(W/2-80, 0, W/2+80, 0);
