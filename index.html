// ─── MAIN BACKGROUND DRAW ────────────────────
function drawBg() {
  var pv = getPhaseVisual();
  var pi = getPhaseIdx();

  // Base gradient
  var g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, pv.bg[0]); g.addColorStop(1, pv.bg[1]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // ── Phase-specific background elements ──
  if(pi === 0) {
    // PHASE 1 — PERPDEX TERMINAL: matrix grid + chart
    ctx.strokeStyle = '#00ff4109'; ctx.lineWidth = 0.5;
    for(var gxi=0; gxi<W; gxi+=20){ ctx.beginPath(); ctx.moveTo(gxi,22); ctx.lineTo(gxi,H); ctx.stroke(); }
    for(var gyi=22; gyi<H; gyi+=20){ ctx.beginPath(); ctx.moveTo(0,gyi); ctx.lineTo(W,gyi); ctx.stroke(); }
    ctx.strokeStyle = '#00ff4120'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for(var cx2=0; cx2<=W; cx2+=4) {
      var cy2 = H*0.42 + Math.sin((cx2+frame*0.4)*0.04)*55 + Math.cos((cx2+frame*0.22)*0.025)*30;
      cx2===0 ? ctx.moveTo(cx2,cy2) : ctx.lineTo(cx2,cy2);
    }
    ctx.stroke();
    ctx.font = '9px Courier New';
    var chars = ['0','1','$','%','+','8','3','-'];
    for(var mi=0; mi<14; mi++) {
      var mx3 = (mi*37+3) % W;
      var my3 = ((mi*83 + frame*(1+(mi%3))) % (H-100) + H-100) % (H-100) + 22;
      ctx.globalAlpha = 0.1 + (mi%4)*0.04;
      ctx.fillStyle = '#00ff41';
      ctx.fillText(chars[(mi+Math.floor(frame/18+mi))%chars.length], mx3, my3);
    }
    ctx.globalAlpha = 1;

  } else if(pi === 1) {
    // PHASE 2 — BASE NETWORK: sunny sky + clouds
    drawSunnyBlueSkyBg();

  } else if(pi === 2) {
    // PHASE 3 — TO THE MOON: mountains + snow
    drawMountainBackground();
    drawClouds(0.2);
    drawSnowflakes();

  } else if(pi === 3) {
    // PHASE 4 — CRYPTO FOREST: pine trees + drizzle
    drawForestTrees();
    var lakeY = H - 180;
    var lake = ctx.createLinearGradient(0, lakeY, 0, lakeY+40);
    lake.addColorStop(0, '#1a3a4a66'); lake.addColorStop(1, '#0a1e2a44');
    ctx.fillStyle = lake; ctx.fillRect(0, lakeY, W, 40);
    ctx.strokeStyle = '#4a8aaa55'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,lakeY); ctx.lineTo(W,lakeY); ctx.stroke();
    var fog = ctx.createLinearGradient(0, H-200, 0, H-80);
    fog.addColorStop(0,'transparent'); fog.addColorStop(1,'#b0d8f018');
    ctx.fillStyle = fog; ctx.fillRect(0, H-200, W, 120);
    drawDrizzle();

  } else if(pi === 4) {
    // PHASE 5 — HEAVEN'S GATE: titan face + divine rays + pillars
    drawTitanFaceBg();
    drawHeavenRays();
    drawHeavenPillars();
    drawClouds(0.18);
    var mist = ctx.createLinearGradient(0, H-200, 0, H-80);
    mist.addColorStop(0,'transparent'); mist.addColorStop(1,'#FFD70028');
    ctx.fillStyle = mist; ctx.fillRect(0, H-200, W, 120);

  } else if(pi === 5) {
    // PHASE 6 — DUNGEON CASTLE: ghosts + chains + stone atmosphere
    drawGhostDungeonBg();

  } else if(pi === 6) {
    // PHASE 7 — OUTER SPACE: planets + asteroids
    drawSpacePlanetsBg();
    drawAsteroids();

  } else if(pi === 7) {
    // PHASE 8 — CELESTIAL DESERT: colossal ruins + moon + desert + poison rain
    drawCelestialDesertBg();
    drawPoisonDrops();

  } else if(pi === 8) {
    // PHASE 9 — THE LIMBO: monsters + flickering darkness
    drawLimboBg();

  } else if(pi === 9) {
    // PHASE 10 — COINBASE PLANET: sunny + money + fireworks
    drawCoinbasePlanetBg();
  }

  // Ticker top bar
  drawTicker(pv);

  // Ground
  drawGround(pv);

  // Phase name bottom-right
  ctx.fillStyle = pv.glowColor + '55'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'right';
  ctx.fillText(pv.name, W-10, H-62);
}

// ─── BANNER DE FASE — topo compacto ──────────
function drawPhaseBanner() {
  if(phaseFlash <= 0) return;
  phaseFlash--;
  var ph    = getPhase();
  var pv    = getPhaseVisual();
  var alpha = phaseFlash > 90 ? 1 : phaseFlash / 90;
  ctx.save();
  ctx.globalAlpha = alpha;
  // Slim bar just below the ticker (ticker is 20px tall)
  ctx.fillStyle = '#000000ee';
  ctx.fillRect(0, 21, W, 24);
  // Glow border bottom
  ctx.shadowColor = pv.glowColor; ctx.shadowBlur = 8;
  ctx.fillStyle = pv.glowColor;
  ctx.fillRect(0, 44, W, 1);
  ctx.shadowBlur = 0;
  // Left: phase label
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 10px Courier New';
  ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 6;
  ctx.fillText(ph.label, 8, 37);
  ctx.shadowBlur = 0;
  // Center: scene name with glow
  ctx.textAlign = 'center';
  ctx.fillStyle = pv.glowColor; ctx.font = 'bold 10px Courier New';
  ctx.shadowColor = pv.glowColor; ctx.shadowBlur = 10;
  ctx.fillText(pv.name, W/2, 37);
  ctx.shadowBlur = 0;
  // Right: speed
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffffff88'; ctx.font = '9px Courier New';
  ctx.fillText('spd ' + ph.speed.toFixed(1) + 'x', W-8, 37);
  ctx.restore();
}

// ─── PARTÍCULAS ──────────────────────────────
function spawnParticles(x, y, color, n) {
  n = n || 14;
  for(var i=0; i<n; i++)
    particles.push({x:x, y:y, vx:(Math.random()-.5)*7, vy:(Math.random()-.5)*7, life:50, color:color});
}
function updateParticles() {
  particles = particles.filter(function(p){ return p.life>0; });
  for(var i=0; i<particles.length; i++){
    var p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

// ─── COLISÃO ─────────────────────────────────
function hitTest() {
  var r = 14;
  for(var i=0; i<pipes.length; i++){
    var p = pipes[i];
    if(bleu.x+r > p.x && bleu.x-r < p.x+p.bodyW){
      if(bleu.y-r < p.topH) return true;
      if(bleu.y+r > p.botY) return true;
    }
  }
  return bleu.y+r > H-80 || bleu.y-r < 22;
}

// ─── LOOP PRINCIPAL ──────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frame++;
  drawBg();
  ctx.save();
  if(screenShake>0){ctx.translate((Math.random()-.5)*screenShake*2,(Math.random()-.5)*screenShake*.7);}

  // ── IDLE ──
  if(gameState === 'idle'){
    drawCharacter(bleu.x, bleu.y + Math.sin(frame*.045)*8, frame*.22, 0);
    ctx.textAlign = 'center';
    ctx.font = 'bold 34px Courier New';
    var tg = ctx.createLinearGradient(W/2-80, 0, W/2+80, 0);
    tg.addColorStop(0,'#0052FF'); tg.addColorStop(0.5,'#00D4FF'); tg.addColorStop(1,'#FFD700');
    ctx.fillStyle = tg;
    ctx.shadowColor = '#0052FF'; ctx.shadowBlur = 28;
    ctx.fillText('FLAPY BLEU', W/2, H/2-82);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px Courier New';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
    ctx.fillText('$BLEU  *  BASE NETWORK  *  TO THE MOON', W/2, H/2-56);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff88'; ctx.font = '13px Courier New';
    ctx.fillText('tap / SPACE to fly', W/2, H/2-26);
    ctx.fillStyle = '#ffffff44'; ctx.font = '10px Courier New';
    ctx.fillText('dodge the candles  *  ride the charts', W/2, H/2-4);
    if(highScore > 0){
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px Courier New';
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
      ctx.fillText('BEST: ' + highScore, W/2, H/2+46);
      ctx.shadowBlur = 0;
    }
    drawCharSelect();
    ctx.fillStyle = '#0052FF88'; ctx.font = '10px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('powered by Base Network', W/2, H-95);
    return;
  }

  // ── PLAYING ──
  if(gameState === 'playing'){
    bleu.vy   += 0.38;
    bleu.y    += bleu.vy;
    bleu.flap += 0.25;

    var ph  = getPhase();
    var pi  = getPhaseIdx();
    var pv  = getPhaseVisual();

    // spawn de pipes
    var spawnEvery = Math.max(60, 92 - pi * 3);
    if(frame % spawnEvery === 0){
      pipes.push(makePipe(W+10));
    }

    // move pipes
    var spd = ph.speed;
    for(var i=0; i<pipes.length; i++){
      var p = pipes[i];
      p.x -= spd;
      if(!p.passed && p.x+p.bodyW < bleu.x){
        p.passed = true; score++; scorePop = 12;
        beep(523, 1047, 0.22, 'sine', 0.14);
        spawnParticles(bleu.x, bleu.y, '#FFD700', 10);
        spawnParticles(bleu.x, bleu.y, pv.glowColor, 6);

        // phase change detection
        var newPI = getPhaseIdx();
        if(newPI > lastPhaseIdx) {
          lastPhaseIdx = newPI;
          phaseFlash   = 150;
          spawnParticles(W/2, H/2, '#FFD700', 30);
          spawnParticles(W/2, H/2, '#00D4FF', 20);
          var fs = [440,554,659,880];
          fs.forEach(function(f,ii){ setTimeout(function(){ beep(f,f*1.5,0.2,'sine',0.18); }, ii*80); });
          // NFT unlock at phase 10 (score >= 100 in test mode)
          if(newPI >= 9 && unlockedChars < 2) { // phase 10 reached (score >= 36 in test mode)
            unlockedChars = 2;
            localStorage.setItem('bleuChars', '2');
            nftFlash = 220;
            spawnParticles(W/2, H/2, '#FF6B20', 40);
            spawnParticles(W/2, H/2, '#FFD700', 40);
            [523,659,784,1047,1319].forEach(function(f,ii){
              setTimeout(function(){ beep(f,f*1.2,0.25,'sine',0.2); }, ii*100);
            });
          }
        }
      }
    }
    pipes = pipes.filter(function(p){ return p.x > -70; });

    // ── COINS: spawn ──
    if(frame % 140 === 70) {
      var cy0 = 80 + Math.random() * (H - 220);
      coins.push({ x: W + 14, y: cy0, collected: false, pulse: frame });
    }
    // ── COINS: move + collect + draw ──
    var spd2 = getPhase().speed;
    for(var ci3 = coins.length - 1; ci3 >= 0; ci3--) {
      var coin = coins[ci3];
      coin.x -= spd2;
      if(coin.x < -20) { coins.splice(ci3, 1); continue; }
      if(!coin.collected) {
        var dx3 = bleu.x - coin.x, dy3 = bleu.y - coin.y;
        if(Math.sqrt(dx3*dx3 + dy3*dy3) < 23) {
          coin.collected = true;
          coinCount++;
          spawnParticles(coin.x, coin.y, '#88ccff', 8);
          spawnParticles(coin.x, coin.y, '#ffffff', 4);
          beep(880, 1320, 0.12, 'sine', 0.1);
          coins.splice(ci3, 1); continue;
        }
      }
      // Bob animation
      var bob = Math.sin((frame - coin.pulse) * 0.06) * 3;
      drawCoin(coin.x, coin.y + bob);
    }

    for(var i=0; i<pipes.length; i++) drawObstacle(pipes[i]);
    ctx.save();
    if(bleuSquish>0){var _sq=bleuSquish/8;ctx.translate(bleu.x,bleu.y);ctx.scale(1+_sq*.2,1-_sq*.18);ctx.translate(-bleu.x,-bleu.y);bleuSquish--;}
    drawCharacter(bleu.x, bleu.y, bleu.flap, bleu.vy);
    ctx.restore();
    updateParticles();
    drawPhaseBanner();
    drawNFTBanner();

    // HUD — score
    ctx.textAlign = 'center';
    var _ps = scorePop>0 ? 1+(scorePop/12)*0.6 : 1;
    ctx.save(); ctx.translate(W/2,52); ctx.scale(_ps,_ps);
    ctx.font = 'bold 26px Courier New';
    ctx.shadowColor = pv.glowColor; ctx.shadowBlur = 14+scorePop*2;
    ctx.fillStyle = pv.glowColor;
    ctx.fillText(score, 0, 0);
    ctx.restore(); ctx.shadowBlur = 0;
    if(scorePop>0) scorePop--;
    // HUD — coin counter (top right)
    drawCoin(W - 38, 34);
    ctx.shadowColor = '#88ccff'; ctx.shadowBlur = 6;
    ctx.fillStyle = '#d8f4ff'; ctx.font = 'bold 13px Courier New'; ctx.textAlign = 'left';
    ctx.fillText(coinCount, W - 24, 39);
    ctx.shadowBlur = 0;
    // progress bar — top left, below ticker
    var progress = (score % 4) / 4;
    ctx.fillStyle = '#ffffff14';
    ctx.fillRect(6, 23, 70, 3);
    var barG = ctx.createLinearGradient(6, 23, 76, 23);
    barG.addColorStop(0,'#FFD700'); barG.addColorStop(1,'#00D4FF');
    ctx.fillStyle = barG;
    ctx.fillRect(6, 23, 70 * progress, 3);
    // best
    if(highScore > 0){
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff44'; ctx.font = '10px Courier New';
      ctx.fillText('best ' + highScore, W/2, 68);
    }

    if(hitTest()){
      spawnParticles(bleu.x, bleu.y, '#FF1744', 20);
      spawnParticles(bleu.x, bleu.y, '#FFD700', 10);
      beep(350, 60, 0.5, 'sawtooth', 0.25);
      if(score > highScore){
        highScore = score; newRecord = true;
        localStorage.setItem('bleuHS', highScore);
        [523,659,784,1047].forEach(function(f,i){
          setTimeout(function(){ beep(f,f,0.15,'sine',0.14); }, i*85);
        });
      }
      gameState = 'dead'; screenShake = 14; hitFlash = 8;
    }
  }

  // ── DEAD ──
  if(gameState === 'dead'){
    for(var i=0; i<pipes.length; i++) drawObstacle(pipes[i]);
    drawCharacter(bleu.x, bleu.y+4, bleu.flap, bleu.vy);
    updateParticles();
    ctx.textAlign = 'center';
    if(newRecord){
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 15px Courier New';
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 24;
      ctx.fillText('NEW RECORD!', W/2, H/2-92);
      ctx.shadowBlur = 0;
    }
    ctx.font = 'bold 30px Courier New';
    ctx.shadowColor = '#FF1744'; ctx.shadowBlur = 24;
    ctx.fillStyle = '#FF1744';
    ctx.fillText('REKT', W/2, H/2-50);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = '20px Courier New';
    ctx.fillText('Score: ' + score, W/2, H/2-10);
    ctx.fillStyle = '#00D4FF'; ctx.font = 'bold 12px Courier New';
    ctx.fillText(getPhase().label + ' reached', W/2, H/2+12);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px Courier New';
    ctx.shadowColor = '#FFD70066'; ctx.shadowBlur = 10;
    ctx.fillText('Best: ' + highScore, W/2, H/2+32);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0052FF99'; ctx.font = '13px Courier New';
    ctx.fillText('tap / SPACE to retry', W/2, H/2+56);
    ctx.fillStyle = '#FFD700'; ctx.font = '11px Courier New';
    ctx.fillText('$BLEU never stops', W/2, H/2+74);
  }
  ctx.restore();
  if(screenShake>0)screenShake--;
  if(hitFlash>0){ctx.globalAlpha=(hitFlash/8)*.38;ctx.fillStyle='#ff1133';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;hitFlash--;}
}

// ─── INPUT ───────────────────────────────────
function flap() {
  if(gameState==='idle')         { gameState='playing'; }
  else if(gameState==='playing') { bleu.vy=-7.5; bleu.flap=-1; bleuSquish=8; beep(260,520,0.09,'sine',0.16); }
  else if(gameState==='dead')    { resetGame(); gameState='playing'; }
}

function handleClick(ex, ey) {
  // Character select buttons in idle screen
  if(gameState === 'idle' && unlockedChars >= 2) {
    var bx1 = W/2 - 55, bx2 = W/2 + 15, by = H/2+80, bw = 40, bh = 16;
    // Need canvas-relative coords
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width, scaleY = H / rect.height;
    var cx2 = (ex - rect.left) * scaleX;
    var cy2 = (ey - rect.top)  * scaleY;
    if(cx2>=bx1 && cx2<=bx1+bw && cy2>=by && cy2<=by+bh) {
      activeChar = 0; localStorage.setItem('bleuActiveChar','0');
      beep(440,880,0.1,'sine',0.12); return;
    }
    if(cx2>=bx2 && cx2<=bx2+bw && cy2>=by && cy2<=by+bh) {
      activeChar = 1; localStorage.setItem('bleuActiveChar','1');
      beep(660,1320,0.1,'sine',0.12); return;
    }
  }
  flap();
}

canvas.addEventListener('click', function(e){ handleClick(e.clientX, e.clientY); });
document.addEventListener('keydown', function(e){ if(e.code==='Space'){ e.preventDefault(); flap(); } });
canvas.addEventListener('touchstart', function(e){ e.preventDefault(); handleClick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

loop();
</script>
