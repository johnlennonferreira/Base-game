      ctx.fillText('FLAPY BLEU', W/2, H/2-82); ctx.shadowBlur = 0;
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px Courier New';
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
      ctx.fillText('$BLEU  *  BASE NETWORK  *  TO THE MOON', W/2, H/2-56);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff88'; ctx.font = '13px Courier New';
      ctx.fillText('tap / SPACE to fly', W/2, H/2-26);
      ctx.fillStyle = '#ffffff44'; ctx.font = '10px Courier New';
      ctx.fillText('dodge the candles  *  ride the charts', W/2, H/2-4);
      if(highScore > 0){
        ctx.fillStyle = '#FFD700'; ctx.font = 'bold 13px Courier New';
        ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 12;
        ctx.fillText('BEST: ' + highScore, W/2, H/2+46); ctx.shadowBlur = 0;
      }
      drawCharSelect();
      ctx.fillStyle = '#0052FF88'; ctx.font = '10px Courier New'; ctx.textAlign = 'center';
      ctx.fillText('powered by Base Network', W/2, H-95);
    } else if(idleTab==='shop'){
      drawShopTab();
    } else if(idleTab==='skins'){
      drawSkinsTab();
    } else if(idleTab==='leaderboard'){
      drawLeaderboardTab();
    }
    return;
  }

  // ── PLAYING ──
  if(gameState === 'playing' && !shopOverlay && !paused){
    bleu.vy   += 0.38;
    bleu.y    += bleu.vy;
    bleu.flap += 0.25;

    var ph  = getPhase();
    var pi  = getPhaseIdx();
    var pv  = getPhaseVisual();

    // spawn de pipes
    var spawnEvery = Math.max(60, 92 - pi * 3);
    if(frame % spawnEvery === 0){
      pipes.push(makePipe(W+10));
    }

    // move pipes
    var spd = ph.speed;
    for(var i=0; i<pipes.length; i++){
      var p = pipes[i];
      p.x -= spd;
      if(!p.passed && p.x+p.bodyW < bleu.x){
        p.passed = true; score++; scorePop = 12; scoreGlow = 14;
        combo++; comboFlash=22; coinsThisRun++;
        if(navigator.vibrate) navigator.vibrate(10);
        // escalating pitch with combo
        var pitch = Math.min(260 + score*14, 900);
        beep(pitch, pitch*2, 0.18, 'sine', 0.13);
        if(combo===3){ beep(pitch*1.5, pitch*3, 0.14, 'sine', 0.08); screenShake=4; }
        if(combo===5){ beep(880, 1760, 0.22, 'square', 0.08); screenShake=6; spawnScorePopup(bleu.x,bleu.y-55,'🔥 FEVER!'); }
        if(combo===10){ beep(1047, 2093, 0.28, 'square', 0.1); screenShake=8; spawnScorePopup(bleu.x,bleu.y-55,'💎 x10 ULTRA!'); }
        spawnScorePopup(bleu.x, bleu.y-25);
        // milestone bonus
        if(MILESTONES[milestoneIdx] && score>=MILESTONES[milestoneIdx]){
          var bonus = MILESTONES[milestoneIdx]*2;
          coinCount+=bonus; localStorage.setItem('bleuCoins',coinCount);
          spawnScorePopup(bleu.x, bleu.y-55, '+'+bonus+' 🐉 BÔNUS!');
          beep(880,1760,0.35,'sine',0.18);
          screenShake=8;
          milestoneIdx++;
          if(navigator.vibrate) navigator.vibrate([50,20,50,20,80]);
        }
        // record mid-game flash
        if(score>highScore && !newRecord) recFlash=55;

        // phase change detection
        var newPI = getPhaseIdx();
        if(newPI > lastPhaseIdx) {
          _bgGradPhase=-1; completedPhase = lastPhaseIdx;
          lastPhaseIdx = newPI;
          phaseFlash   = 150;
          startMusic(newPI);
          spawnParticles(W/2, H/2, '#FFD700', 30);
          spawnParticles(W/2, H/2, '#00D4FF', 20);
          var fs = [440,554,659,880];
          fs.forEach(function(f,ii){ setTimeout(function(){ beep(f,f*1.5,0.2,'sine',0.18); }, ii*80); });
          // NFT unlock at phase 10 (score >= 100 in test mode)
          if(newPI >= 9 && unlockedChars < 2) { // phase 10 reached (score >= 36 in test mode)
            unlockedChars = 2;
            localStorage.setItem('bleuChars', '2');
            nftFlash = 220;
            spawnParticles(W/2, H/2, '#FF6B20', 40);
            spawnParticles(W/2, H/2, '#FFD700', 40);
            [523,659,784,1047,1319].forEach(function(f,ii){
              setTimeout(function(){ beep(f,f*1.2,0.25,'sine',0.2); }, ii*100);
            });
          }
          if(newPI%2===0||newPI===9){ chestType=(newPI===9)?'rare':'normal'; gameState='award'; chestClicks=0;chestBounce=0;chestOpened=false;chestCoins=0;chestOpenAnim=0;bleu.vy=0; }
        }
      }
    }
    pipes = pipes.filter(function(p){ return p.x > -70; });

    // ── COINS: spawn ──
    if(frame % 140 === 70) {
      var cy0 = 80 + Math.random() * (H - 220);
      coins.push({ x: W + 14, y: cy0, collected: false, pulse: frame });
    }
    // ── COINS: move + collect + draw ──
    var spd2 = getPhase().speed;
    for(var ci3 = coins.length - 1; ci3 >= 0; ci3--) {
      var coin = coins[ci3];
      coin.x -= spd2;
      if(coin.x < -20) { coins.splice(ci3, 1); continue; }
      if(!coin.collected) {
        var dx3 = bleu.x - coin.x, dy3 = bleu.y - coin.y;
        if(Math.sqrt(dx3*dx3 + dy3*dy3) < 23) {
          coin.collected = true;
          coinCount++; coinsThisRun++;
          localStorage.setItem('bleuCoins',coinCount);
          spawnParticles(coin.x, coin.y, '#88ccff', 8);
          spawnParticles(coin.x, coin.y, '#ffffff', 4);
          beep(880, 1320, 0.12, 'sine', 0.1);
          coins.splice(ci3, 1); continue;
        }
      }
      // Bob animation
      var bob = Math.sin((frame - coin.pulse) * 0.06) * 3;
      drawCoin(coin.x, coin.y + bob);
    }

    for(var i=0; i<pipes.length; i++) drawObstacle(pipes[i]);
    ctx.save();
    if(scoreGlow>0) scoreGlow--;
    if(bleuSquish>0){var _sq=bleuSquish/8;ctx.translate(bleu.x,bleu.y);ctx.scale(1+_sq*.2,1-_sq*.18);ctx.translate(-bleu.x,-bleu.y);bleuSquish--;}
    drawCharacter(bleu.x, bleu.y, bleu.flap, bleu.vy);
    ctx.restore();
    updateParticles();
    updateScorePopups();
    drawPhaseBanner();
    drawNFTBanner();

    // HUD — score
    ctx.textAlign = 'center';
    var _ps = scorePop>0 ? 1+(scorePop/12)*0.6 : 1;
    ctx.save(); ctx.translate(W/2,52); ctx.scale(_ps,_ps);
    ctx.font = 'bold 26px Courier New';
    ctx.shadowColor = pv.glowColor; ctx.shadowBlur = scorePop>0 ? 14+scorePop*2 : 0;
    ctx.fillStyle = pv.glowColor;
    ctx.fillText(score, 0, 0);
    ctx.restore(); ctx.shadowBlur = 0;
    if(scorePop>0) scorePop--;
    // Pause button
    ctx.fillStyle='#ffffff18'; ctx.strokeStyle='#ffffff33'; ctx.lineWidth=1;
    ctx.fillRect(W-36,6,26,20); ctx.strokeRect(W-36,6,26,20);
    ctx.fillStyle='#ffffffaa'; ctx.font='bold 10px Courier New'; ctx.textAlign='left';
    ctx.fillText(paused?'▶':'II',W-30,20);
    // HUD — coin counter (top right)
    drawCoin(W - 38, 34);
    ctx.shadowColor = '#88ccff'; ctx.shadowBlur = 6;
    ctx.fillStyle = '#d8f4ff'; ctx.font = 'bold 13px Courier New'; ctx.textAlign = 'left';
    ctx.fillText(coinCount, W - 24, 39);
    ctx.shadowBlur = 0;
    // progress bar — top left, below ticker
    var progress = (score % 4) / 4;
    ctx.fillStyle = '#ffffff14';
    ctx.fillRect(6, 23, 70, 3);
    var barG = ctx.createLinearGradient(6, 23, 76, 23);
    barG.addColorStop(0,'#FFD700'); barG.addColorStop(1,'#00D4FF');
    ctx.fillStyle = barG;
    ctx.fillRect(6, 23, 70 * progress, 3);
    // best

      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff44'; ctx.font = '10px Courier New';
      ctx.fillText('best ' + highScore, W/2, 68);
    }
    // combo HUD
    if(comboFlash > 0){
      var ca = Math.min(1, comboFlash/12);

      ctx.globalAlpha = ca;
      ctx.translate(W/2, 84);

      ctx.globalAlpha = ra;
      ctx.textAlign = 'center';
      ctx.font = 'bold 13px Courier New';
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20;
      ctx.fillText('🏆 NOVO RECORDE!', W/2, H/2-70);

      ctx.restore();

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⌂  MENU', W/2, H/2+122);
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#ffffff22'; ctx.font = '9px Courier New';
    ctx.fillText('$BLEU never stops', W/2, H/2+150);
  }
  ctx.restore();
  if(screenShake>0)screenShake--;
  if(shopOverlay){ drawShopOverlay(); }
  if(paused && gameState==='playing'){ ctx.fillStyle='rgba(0,5,20,.65)'; ctx.fillRect(0,0,W,H); ctx.textAlign='center'; ctx.font='bold 22px Courier New'; ctx.fillStyle='#fff'; ctx.shadowColor='#0052FF'; ctx.shadowBlur=20; ctx.fillText('PAUSADO',W/2,H/2); ctx.shadowBlur=0; ctx.font='11px Courier New'; ctx.fillStyle='#ffffff88'; ctx.fillText('toque ▶ ou tecle P para continuar',W/2,H/2+28); }
  if(hitFlash>0){ctx.globalAlpha=(hitFlash/8)*.38;ctx.fillStyle='#ff1133';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;hitFlash--;}
}

// ─── INPUT ───────────────────────────────────
function flap() {
  if(gameState==='idle')         { gameState='playing'; startMusic(getPhaseIdx()); combo=0; comboFlash=0; coinsThisRun=0; milestoneIdx=0; recFlash=0; }
  else if(gameState==='playing') { bleu.vy=-7.5; bleu.flap=-1; bleuSquish=8; beep(260,520,0.09,'sine',0.16); }
  else if(gameState==='dead')    { resetGame(); gameState='playing'; }
}


function hitShopCard(cx, cy, yStart, compact) {
  var cols=3, tw=76, th=compact?82:80, gapX=8, gapY=compact?4:5;
  var startX=W/2-((cols*(tw+gapX)-gapX)/2);
  for(var si=1;si<SKINS.length;si++){
    var idx2=si-1, col=idx2%cols, row=Math.floor(idx2/cols);
    var sx=startX+col*(tw+gapX)+tw/2, sy=yStart+row*(th+gapY);
    if(cx>=sx-tw/2&&cx<=sx+tw/2&&cy>=sy&&cy<=sy+th) return si;
  }
  return -1;
}
function buySkin(si) {
  var sk=SKINS[si], owned=unlockedSkins.indexOf(si)>=0;
  if(owned){ activeSkin=si; localStorage.setItem('bleuSkin',''+si); beep(440+si*50,880+si*50,0.1,'sine',0.12); }
  else if(coinCount>=sk.price){
    coinCount-=sk.price; localStorage.setItem('bleuCoins',coinCount);
    unlockedSkins.push(si); localStorage.setItem('bleuSkins',JSON.stringify(unlockedSkins));
    activeSkin=si; localStorage.setItem('bleuSkin',''+si);
    beep(523,1047,0.3,'sine',0.15);
    [659,784,1047].forEach(function(f,ii){setTimeout(function(){beep(f,f,0.12,'sine',0.1);},ii*70);});
  } else { beep(220,150,0.12,'sawtooth',0.08); hitFlash=3; }
}
function handleClick(ex, ey) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = W/rect.width, scaleY = H/rect.height;
  var cx = (ex-rect.left)*scaleX, cy = (ey-rect.top)*scaleY;
  if(dailyModal){
    if(cx>=W/2-65&&cx<=W/2+65&&cy>=H/2+78&&cy<=H/2+112){ claimDailyReward(); beep(523,1047,0.2,'sine',0.14); }
    return;
  }
  if(shopOverlay){
    if(cy>=H-74&&cy<=H-38&&cx>=W/2-80&&cx<=W/2+80){ shopOverlay=false; return; }
    var si2=hitShopCard(cx,cy,76,true);
    if(si2>=0){ buySkin(si2); return; }
    return;
  }

  // ── AWARD chest click
  if(gameState === 'award') {
    if(!chestOpened) {
      chestClicks++;
      chestBounce = 12;
      beep(440+chestClicks*110, 880+chestClicks*110, 0.12, 'sine', 0.12);
      if(chestClicks >= 3) {
        chestOpened = true;
        chestCoins = chestCoinsRand();
        coinCount += chestCoins;
        localStorage.setItem('bleuCoins', coinCount);
        beep(523,1047,0.3,'sine',0.15);
        [659,784,1047,1319].forEach(function(f,i){
          setTimeout(function(){beep(f,f,0.15,'sine',0.12);},i*80);
        });
      }
    } else if(chestOpenAnim >= 14) {
      shopOverlay = true; gameState = 'playing'; startMusic(getPhaseIdx());
    }
    return;
  }

  // ── DEAD screen buttons
  if(gameState === 'dead') {
    // Menu button: W/2-55 to W/2+55, H/2+108 to H/2+136
    if(cx>=W/2-55&&cx<=W/2+55&&cy>=H/2+108&&cy<=H/2+136){
      resetGame(); idleTab='play'; return;
    }
    // Retry — anywhere else on dead screen
    flap(); return;
  }

  // ── IDLE tabs click
  if(gameState === 'idle') {
    if(idleTab==='shop'){ var si3=hitShopCard(cx,cy,76,false); if(si3>=0){ buySkin(si3); return; } }
    var labels=['play','shop','skins','leaderboard'], tw=70, th=26, gap=6;
    var total=4*(tw+gap)-gap, tx0=W/2-total/2, ty=H-72;
    for(var ti=0;ti<labels.length;ti++) {
      var tx=tx0+ti*(tw+gap);
      if(cx>=tx&&cx<=tx+tw&&cy>=ty&&cy<=ty+th) {
        idleTab=labels[ti]; beep(440,660,0.08,'sine',0.1); return;
      }
    }
    // Skins tab: click to equip (only owned skins shown)
    if(idleTab==='skins') {
      var owned2=unlockedSkins.slice().sort(function(a,b){return a-b;});
      if(owned2.length===0) owned2=[0];
      var cols2=3,tw3=78,th3=92,gapX2=8,totalW3=cols2*(tw3+gapX2)-gapX2,startX2=W/2-totalW3/2;
      for(var ii2=0;ii2<owned2.length;ii2++) {
        var si2=owned2[ii2];
        var col2=ii2%cols2,row2=Math.floor(ii2/cols2);
        var sx2=startX2+col2*(tw3+gapX2)+tw3/2, sy2=H/2-100+row2*(th3+gapX2);
        if(cx>=sx2-tw3/2&&cx<=sx2+tw3/2&&cy>=sy2&&cy<=sy2+th3) {
          activeSkin=si2;
          localStorage.setItem('bleuSkin',''+si2);
          beep(440+si2*55, 880+si2*55, 0.1,'sine',0.12);
          return;
        }
      }
    }
// Character select (legacy, play tab)
    if(idleTab==='play' && unlockedChars >= 2) {
      var bx1=W/2-55, bx2=W/2+15, bby=H/2+80, bbw=40, bbh=16;
      if(cx>=bx1&&cx<=bx1+bbw&&cy>=bby&&cy<=bby+bbh){ activeChar=0; localStorage.setItem('bleuActiveChar','0'); beep(440,880,0.1,'sine',0.12); return; }
      if(cx>=bx2&&cx<=bx2+bbw&&cy>=bby&&cy<=bby+bbh){ activeChar=1; localStorage.setItem('bleuActiveChar','1'); beep(660,1320,0.1,'sine',0.12); return; }
    }
  }

  // Pause button hit (top-right corner, playing state)
  if(gameState==='playing' && cx>=W-36&&cx<=W-10&&cy>=6&&cy<=26){ paused=!paused; return; }
  if(paused) return;
  flap();
}

canvas.addEventListener('click', function(e){ handleClick(e.clientX, e.clientY); });
document.addEventListener('keydown', function(e){
  if(e.code==='Space'){
    e.preventDefault();
    if(gameState==='award'){ handleClick(canvas.getBoundingClientRect().left + W/2, canvas.getBoundingClientRect().top + H/2); return; }
    if(paused){ paused=false; return; }
    if(shopOverlay){ shopOverlay=false; gameState='playing'; startMusic(getPhaseIdx()); return; }
    flap();
  }
  if(e.code==='KeyP' && (gameState==='playing'||paused)){ paused=!paused; }
});
canvas.addEventListener('touchstart', function(e){ e.preventDefault(); handleClick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

checkDailyLogin();
loop();
</script>
